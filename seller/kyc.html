        /* Persistent Premium Sidebar */

    <script>
        const currentAuthenticatedUser = localStorage.getItem('seller_id');
        if (!currentAuthenticatedUser) { window.location.href = 'auth.html'; }

        // Theme initialization
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-mode');
        }

        window.toggleTheme = function() {
            document.documentElement.classList.toggle('light-mode');
            const icon = document.getElementById('theme-icon');
            if(document.documentElement.classList.contains('light-mode')) {
                if(icon) { icon.classList.remove('ri-sun-fill'); icon.classList.add('ri-moon-fill'); }
                localStorage.setItem('theme', 'light');
            } else {
                if(icon) { icon.classList.remove('ri-moon-fill'); icon.classList.add('ri-sun-fill'); }
                localStorage.setItem('theme', 'dark');
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            const icon = document.getElementById('theme-icon');
            if(document.documentElement.classList.contains('light-mode') && icon) {
                icon.classList.remove('ri-sun-fill');
                icon.classList.add('ri-moon-fill');
            }
        });

        // Dynamic Document Selection Logic Based on Country
        window.handleCountryDocChange = function() {
            const country = document.getElementById("form-input-country")?.value;
            const docTypeSelect = document.getElementById("form-input-doctype");
            const docNumLabel = document.getElementById("doc-number-label");
            const docNumInput = document.getElementById("form-input-docnum");

            if (!docTypeSelect) return;

            // Update ID Card Text to CNIC if Pakistan
            Array.from(docTypeSelect.options).forEach(opt => {
                if(country === "Pakistan" && opt.value === "ID Card") {
                    opt.text = "ID Card (CNIC)";
                } else if(opt.value === "ID Card") {
                    opt.text = "ID Card";
                }
            });

            // Update Input Placeholder and Label dynamically
            if (country === "Pakistan" && docTypeSelect.value === "ID Card") {
                docNumLabel.innerText = "CNIC Number";
                docNumInput.placeholder = "Enter 13-Digit CNIC Number";
            } else {
                docNumLabel.innerText = "Document Number";
                docNumInput.placeholder = "Enter Document Number";
            }
        };
    </script>

function triggerSystemToast(messageText, isError = false) {
    const toastReservoir = document.getElementById('toast-reservoir');
    if (!toastReservoir) return;

    const toastCapsule = document.createElement('div');
    toastCapsule.className = `toast-capsule ${isError ? 'toast-error' : ''}`;

    toastCapsule.innerHTML = isError
        ? `<i class="ri-error-warning-fill" style="color:#FF416C; font-size:18px;"></i> <span>${messageText}</span>`
        : `<i class="ri-checkbox-circle-fill" style="color:#00F260; font-size:18px;"></i> <span>${messageText}</span>`;

    toastReservoir.appendChild(toastCapsule);

    setTimeout(() => {
        toastCapsule.style.opacity = '0';
        toastCapsule.style.transform = 'translateY(-20px)';
        setTimeout(() => toastCapsule.remove(), 400);
    }, 3000);
}

async function fetchUserProfileData() {
    try {
        const snap = await get(ref(db, `users/${currentAuthenticatedUser}`));
        if (snap.exists()) {
            cachedUserProfileData = snap.val();

            const target = document.getElementById('topbar-profile-target');
            if (target) {
                target.innerHTML = `
                    <span style="font-weight:700;">${cachedUserProfileData.name || 'User'}</span>
                    <div class="profile-badge-3d">
                        ${(cachedUserProfileData.name || 'U').charAt(0).toUpperCase()}
                    </div>
                `;
            }
        }
    } catch (e) {
        console.error(e);
    }
}

function initializeKycSynchronizationPipeline() {
    const layoutContainer = document.getElementById('kyc-view-matrix');
    if (!layoutContainer) return;

    const kycRef = ref(db, `kycRequests/${currentAuthenticatedUser}`);
    onValue(kycRef, (snapshot) => {
        const data = snapshot.val();
        generateStructuralKycDashboard(data, layoutContainer);
    });
}

function generateStructuralKycDashboard(kycData, containerElement) {
    const status = kycData?.status || null;

    let statusBadgeClass = 'status-unsubmitted';
    let statusIcon = 'ri-file-text-line';
    let title = 'Verification Status';
    let desc = 'Your verification profile has not been configured yet.';

    if (status === 'pending') {
        statusBadgeClass = 'status-pending';
        statusIcon = 'ri-time-line';
        title = 'Under Review';
        desc = 'Your credentials have been logged and are currently pending compliance clearance.';
    }
    else if (status === 'approved') {
        statusBadgeClass = 'status-approved';
        statusIcon = 'ri-shield-check-line';
        title = 'Identity Verified';
        desc = 'Your legal profile has been successfully approved across all systems.';
    }
    else if (status === 'rejected') {
        statusBadgeClass = 'status-rejected';
        statusIcon = 'ri-close-circle-line';
        title = 'Verification Terminated';
        desc = 'Your previous filing did not clear compliance processing rules.';
    }

    const disabled = (status === 'pending' || status === 'approved');
    
    // Top 20 Most Famous Countries List
    const countryOptions = [
        "United States", "United Kingdom", "Canada", "Australia", "Germany",
        "France", "Italy", "Spain", "Pakistan", "India",
        "China", "Japan", "South Korea", "Brazil", "Mexico",
        "South Africa", "Nigeria", "Saudi Arabia", "United Arab Emirates", "Singapore"
    ];

    let countryDropdownHtml = `<option value="">Select Country Profile</option>`;
    countryOptions.forEach(c => {
        countryDropdownHtml += `<option value="${c}" ${kycData?.country === c ? "selected" : ""}>${c}</option>`;
    });

    let html = '';

    // FORM CARD (Visible if not approved)
    if (status !== 'approved') {
        html += `
        <div class="vip-card form-layout-wrapper">
            <h2 class="section-header-title">Identity Profile Verification</h2>
            <p class="section-header-desc">Complete legal identification registration to clear platform limits.</p>

            <form id="kycSubmissionSystemForm" class="form-grid-matrix">
                <div class="field-group-container">
                    <label class="input-label-tag">Legal Full Name</label>
                    <input id="form-input-name" class="premium-input-box" type="text" placeholder="Enter Full Name" value="${kycData?.name || cachedUserProfileData.name || ''}" ${disabled ? 'disabled' : ''} required>
                </div>

                <div class="field-group-container">
                    <label class="input-label-tag">Account Address Email</label>
                    <input id="form-input-email" class="premium-input-box" type="email" placeholder="Enter Account Email" value="${kycData?.email || cachedUserProfileData.email || ''}" ${disabled ? 'disabled' : ''} required>
                </div>

                <div class="field-group-container">
                    <label class="input-label-tag">Jurisdiction Country</label>
                    <select id="form-input-country" class="premium-input-box" ${disabled ? 'disabled' : ''} onchange="window.handleCountryDocChange()" required>
                        ${countryDropdownHtml}
                    </select>
                </div>

                <div class="field-group-container">
                    <label class="input-label-tag">Document Type</label>
                    <select id="form-input-doctype" class="premium-input-box" ${disabled ? 'disabled' : ''} onchange="window.handleCountryDocChange()" required>
                        <option value="">Select Document Type</option>
                        <option value="Passport" ${kycData?.documentType === "Passport" ? "selected" : ""}>Passport</option>
                        <option value="ID Card" ${kycData?.documentType === "ID Card" ? "selected" : ""}>ID Card</option>
                        <option value="Driving License" ${kycData?.documentType === "Driving License" ? "selected" : ""}>Driving License</option>
                        <option value="Other" ${kycData?.documentType === "Other" ? "selected" : ""}>Other</option>
                    </select>
                </div>

                <div class="field-group-container form-field-full-row">
                    <label class="input-label-tag" id="doc-number-label">Document Number</label>
                    <input id="form-input-docnum" class="premium-input-box" type="text" placeholder="Enter Document Number" ${disabled ? 'disabled' : ''} value="${kycData?.documentNumber || ''}" required>
                </div>

                <div class="field-group-container form-field-full-row">
                    <label class="input-label-tag">Residential Address Trace</label>
                    <input id="form-input-address" class="premium-input-box" type="text" placeholder="Physical location description" ${disabled ? 'disabled' : ''} value="${kycData?.address || ''}" required>
                </div>

                ${!disabled ? `
                <div class="field-group-container">
                    <label class="input-label-tag">Front Document Image</label>
                    <div class="file-upload-wrapper">
                        <i class="ri-image-add-line" style="font-size: 24px; color: var(--text-muted);"></i>
                        <span id="front-file-name" style="font-size: 13px; color: var(--text-muted); font-weight:600;">Click or drop front image</span>
                        <input type="file" id="form-input-front-img" class="file-upload-input" accept="image/*" required onchange="document.getElementById('front-file-name').innerText = this.files[0]?.name || 'Click or drop front image'">
                    </div>
                </div>

                <div class="field-group-container">
                    <label class="input-label-tag">Back Document Image</label>
                    <div class="file-upload-wrapper">
                        <i class="ri-image-add-line" style="font-size: 24px; color: var(--text-muted);"></i>
                        <span id="back-file-name" style="font-size: 13px; color: var(--text-muted); font-weight:600;">Click or drop back image</span>
                        <input type="file" id="form-input-back-img" class="file-upload-input" accept="image/*" required onchange="document.getElementById('back-file-name').innerText = this.files[0]?.name || 'Click or drop back image'">
                    </div>
                </div>

                <div class="form-field-full-row button-flex-align">
                    <button id="submit-btn" class="premium-cta-btn" type="submit">
                        <i class="ri-send-plane-fill"></i> Submit Verification
                    </button>
                </div>` : ''}
            </form>
        </div>`;
    }

    // SYSTEM STATUS CARD SIDEBAR / CENTERED BOX
    if (status === 'approved') {
        // Centered Beautiful Fixed Layout for Approved
        html += `
        <div class="approved-center-wrapper">
            <div class="vip-card status-box-fixed">
                <div class="status-display-panel">
                    <div class="status-icon-glow ${statusBadgeClass}">
                        <i class="${statusIcon}"></i>
                    </div>
                    <h3 class="status-title-text">${title}</h3>
                    <p class="status-desc-text">${desc}</p>
                </div>
            </div>
        </div>
        `;
    } else {
        // Regular Sidebar Layout for Unsubmitted, Pending, Rejected
        html += `
        <div class="vip-card status-sidebar-wrapper">
            <div class="status-display-panel">
                <div class="status-icon-glow ${statusBadgeClass}">
                    <i class="${statusIcon}"></i>
                </div>
                <h3 class="status-title-text">${title}</h3>
                <p class="status-desc-text">${desc}</p>

                ${kycData?.reason ? `
                <div class="rejection-reason-box">
                    <div class="rejection-lbl">Rejection Context Rule</div>
                    <div class="rejection-txt">${kycData.reason}</div>
                </div>` : ''}
            </div>
        </div>
        `;
    }

    containerElement.innerHTML = html;
    
    // Trigger the doc change logic dynamically on load to set proper placeholders if pre-filled
    if (status !== 'approved') {
        window.handleCountryDocChange();
    }

    const form = document.getElementById("kycSubmissionSystemForm");
    if (form) {
        form.addEventListener("submit", submitKYC);
    }
}

// Helper: Upload Image to ImgBB
async function uploadImageToImgbb(file) {
    const formData = new FormData();
    formData.append('image', file);
    
    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
        method: 'POST',
        body: formData
    });
    
    const data = await response.json();
    if (data.success) {
        return data.data.url;
    } else {
        throw new Error("Failed to upload image to remote server.");
    }
}

async function submitKYC(e) {
    e.preventDefault();

    const submitBtn = document.getElementById("submit-btn");
    submitBtn.disabled = true;
    submitBtn.innerHTML = `<div class="spinner-3d" style="width: 20px; height: 20px; border-width: 2px;"></div> Uploading...`;

    const name = document.getElementById("form-input-name").value.trim();
    const email = document.getElementById("form-input-email").value.trim();
    const country = document.getElementById("form-input-country").value;
    const documentType = document.getElementById("form-input-doctype").value;
    const documentNumber = document.getElementById("form-input-docnum").value.trim();
    const address = document.getElementById("form-input-address").value.trim();
    
    const frontImgFile = document.getElementById("form-input-front-img").files[0];
    const backImgFile = document.getElementById("form-input-back-img").files[0];

    if (!name || !email || !country || !documentType || !documentNumber || !address || !frontImgFile || !backImgFile) {
        triggerSystemToast("All input validation fields and images are required", true);
        submitBtn.disabled = false;
        submitBtn.innerHTML = `<i class="ri-send-plane-fill"></i> Submit Verification`;
        return;
    }

    try {
        triggerSystemToast("Encrypting and syncing documents...");
        
        // Upload images to imgbb
        const frontDocumentUrl = await uploadImageToImgbb(frontImgFile);
        const backDocumentUrl = await uploadImageToImgbb(backImgFile);

        const payload = {
            userId: currentAuthenticatedUser,
            name,
            email,
            username: currentAuthenticatedUser,
            country,
            documentType,
            documentNumber,
            address,
            frontDocumentUrl,
            backDocumentUrl,
            status: "pending",
            submittedAt: Date.now(),
            updatedAt: Date.now(),
            reason: ""
        };

        await set(ref(db, `kycRequests/${currentAuthenticatedUser}`), payload);
        triggerSystemToast("KYC Registry Request Logged Successfully");
        
    } catch (e) {
        triggerSystemToast(e.message, true);
        submitBtn.disabled = false;
        submitBtn.innerHTML = `<i class="ri-send-plane-fill"></i> Submit Verification`;
    }
}

document.addEventListener("DOMContentLoaded", async () => {
    await fetchUserProfileData();
    initializeKycSynchronizationPipeline();
});
</script>
