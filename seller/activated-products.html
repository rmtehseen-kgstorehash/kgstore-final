<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kogan | Activated Products</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

    <style>

        :root {
            --bg-deep: #030306;
            --glass-surface: rgba(13, 13, 20, 0.45);
            --glass-card: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-border-light: rgba(255, 255, 255, 0.12);
            --glow-gold: linear-gradient(135deg, #FFE259 0%, #FFA751 100%);
            --glow-cyan: linear-gradient(135deg, #00F2FE 0%, #4FACFE 100%);
            --glow-neon: linear-gradient(135deg, #7F00FF 0%, #E100FF 100%);
            --text-gradient: linear-gradient(180deg, #FFFFFF 0%, #A0A0B5 100%);
            --text-main: #FFFFFF;
            --text-muted: #7E7E96;
            --shadow-3d: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        [data-theme='light'] {
            --bg-deep: #f0f0f5;
            --glass-surface: rgba(255, 255, 255, 0.8);
            --glass-card: rgba(0, 0, 0, 0.05);
            --glass-border: rgba(0, 0, 0, 0.1);
            --glass-border-light: rgba(0, 0, 0, 0.15);
            --text-main: #030306;
            --text-muted: #555566;
            --shadow-3d: 0 10px 30px rgba(0, 0, 0, 0.1), inset 0 1px 1px rgba(255, 255, 255, 1);
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Plus Jakarta Sans', sans-serif;
        }

        body{
            background-color:var(--bg-deep);
            color:var(--text-main);
            display:flex;
            height:100vh;
            overflow:hidden;
            position:relative;
            transition: background 0.3s, color 0.3s;
        }

        .ambient-field{
            position:absolute;
            border-radius:50%;
            filter:blur(140px);
            z-index:-1;
            opacity:.45;
            animation:orbit 25s infinite alternate ease-in-out;
        }

        .field-gold{
            width:500px;
            height:500px;
            background: radial-gradient(circle, #FFA751 0%, transparent 70%);
            top:-150px;
            right:-100px;
        }

        .field-purple{
            width:600px;
            height:600px;
            background: radial-gradient(circle, #7F00FF 0%, transparent 70%);
            bottom:-200px;
            left:-150px;
            animation-delay:-10s;
        }

        @keyframes orbit{
            0%{ transform:translate(0,0) scale(1) rotate(0deg); }
            100%{ transform:translate(60px,40px) scale(1.15) rotate(360deg); }
        }

        .sidebar{
            width:290px;
            background:var(--glass-surface);
            backdrop-filter:blur(30px);
            border-right:1px solid var(--glass-border);
            padding:40px 24px;
            display:flex;
            flex-direction:column;
            z-index:100;
            transition:transform .4s cubic-bezier(0.16,1,0.3,1);
        }

        .brand-meta{
            display:flex;
            align-items:center;
            gap:12px;
            margin-bottom:50px;
            padding-left:12px;
        }

        .brand-logo-cube{
            width:32px;
            height:32px;
            background:var(--glow-cyan);
            border-radius:8px;
            transform:rotate(45deg);
        }

        .brand-name{
            font-size:22px;
            font-weight:800;
            background:var(--glow-cyan);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .nav-list{
            list-style:none;
            display:flex;
            flex-direction:column;
            gap:6px;
        }

        .nav-link{
            text-decoration:none;
            padding:16px 20px;
            border-radius:16px;
            display:flex;
            align-items:center;
            gap:16px;
            font-size:15px;
            font-weight:600;
            color:var(--text-muted);
            transition:.3s;
            border:1px solid transparent;
        }

        .nav-link i{ font-size:20px; }

        .nav-link:hover{
            color:var(--text-main);
            background:rgba(255,255,255,0.02);
            border-color:var(--glass-border);
        }

        .nav-link.active{
            color:var(--text-main);
            background:var(--glass-card);
            border:1px solid var(--glass-border);
            box-shadow:var(--shadow-3d);
        }

        .nav-link.active i{ color:#00F2FE; }

        .app-container{
            flex:1;
            display:flex;
            flex-direction:column;
            overflow:hidden;
        }

        .header-bar{
            height:90px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 48px;
            border-bottom:1px solid var(--glass-border);
            background:rgba(3,3,6,0.3);
            backdrop-filter:blur(15px);
        }

        .menu-trigger, .theme-trigger{
            background:none;
            border:1px solid var(--glass-border);
            color:var(--text-main);
            width:40px;
            height:40px;
            border-radius:12px;
            cursor:pointer;
            font-size:20px;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .theme-trigger { margin-right: 15px; }

        .menu-trigger{ display:none; }

        .sidebar-overlay{
            display:none;
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.6);
            z-index:95;
        }

        .profile-cluster{
            display:flex;
            align-items:center;
            gap:16px;
        }

        .stage-view{
            flex:1;
            padding:48px;
            overflow-y:auto;
        }

        .vip-matrix{
            display:grid;
            grid-template-columns:repeat(12,1fr);
            gap:28px;
            justify-content: center; 
            margin-bottom:36px;
        }

        .vip-card{
            background:var(--glass-card);
            backdrop-filter:blur(20px);
            border:1px solid var(--glass-border);
            border-radius:28px;
            box-shadow:var(--shadow-3d);
        }

        .metric-card{
            grid-column:span 3;
            padding:32px;
        }

        .metric-label{
            color:var(--text-muted);
            font-size:14px;
            font-weight:600;
            margin-bottom:12px;
        }

        .metric-val{
            font-size:32px;
            font-weight:800;
        }

        .products-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(360px,1fr));
            gap:32px;
        }

        .product-vip-card{
            overflow:hidden;
            display:flex;
            flex-direction:column;
        }

        .card-media-wrapper{
            width:100%;
            height:240px;
            position:relative;
            overflow:hidden;
            border-bottom:1px solid var(--glass-border);
        }

        .card-thumb{
            width:100%;
            height:100%;
            object-fit:cover;
            transition:.5s;
        }

        .product-vip-card:hover .card-thumb{ transform:scale(1.06); }

        .card-core-payload{
            padding:28px;
            display:flex;
            flex-direction:column;
            flex:1;
        }

        .product-meta-title{
            font-size:22px;
            font-weight:800;
            margin-bottom:10px;
        }

        .referral-asset-box{ margin-top:auto; }

        .referral-input-container{
            display:flex;
            align-items:center;
            gap:10px;
            background:rgba(0,0,0,0.1);
            border:1px solid var(--glass-border);
            border-radius:18px;
            padding:10px;
        }

        .referral-url-string{
            flex:1;
            background:transparent;
            border:none;
            outline:none;
            color:var(--text-muted);
            font-size:13px;
        }

        .copy-trigger-btn{
            width:42px;
            height:42px;
            border:none;
            border-radius:12px;
            background:var(--glow-cyan);
            color:#030306;
            cursor:pointer;
            font-size:18px;
        }

        .logout-btn{
            background:rgba(255,50,50,0.1);
            border:1px solid rgba(255,50,50,0.3);
            color:#ff5555;
            padding:10px 20px;
            border-radius:12px;
            cursor:pointer;
            font-weight:600;
            display:flex;
            align-items:center;
            gap:8px;
        }

        .loader-backdrop{
            display:flex;
            justify-content:center;
            align-items:center;
            padding:80px 0;
            grid-column:span 12;
        }

        .spinner-3d{
            border:3px solid rgba(128,128,128,0.2);
            border-top:3px solid #00F2FE;
            border-radius:50%;
            width:48px;
            height:48px;
            animation:spin .8s linear infinite;
        }

        @keyframes spin{ 100%{ transform:rotate(360deg); } }

        @media(max-width:768px){
            .sidebar{ position:fixed; left:-290px; height:100%; }
            .sidebar.visible{ transform:translateX(290px); }
            .menu-trigger{ display:block; }
            .metric-card{ grid-column:span 12; }
            .products-grid{ grid-template-columns:1fr; }
        }
    </style>
</head>
<body>

<script>
    const currentAuthenticatedUser = localStorage.getItem('seller_id');
    if(!currentAuthenticatedUser){ window.location.href = 'auth.html'; }
    
    // Theme Handler
    function toggleTheme() {
        const body = document.body;
        const isLight = body.getAttribute('data-theme') === 'light';
        body.setAttribute('data-theme', isLight ? 'dark' : 'light');
        localStorage.setItem('theme', isLight ? 'dark' : 'light');
    }
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.body.setAttribute('data-theme', savedTheme);
</script>

<div class="sidebar-overlay" id="sidebar-overlay-node" onclick="toggleSidebarView()"></div>

<nav class="sidebar" id="sidebar-node">
    <div class="brand-meta">
        <div class="brand-logo-cube"></div>
        <span class="brand-name">Kogan</span>
    </div>
    <ul class="nav-list">
        <a href="dashboard.html" class="nav-link"><i class="ri-dashboard-3-line"></i> Dashboard</a>
            <a href="activated-products.html" class="nav-link"><i class="ri-shopping-bag-3-line"></i> Activated Products</a>
            <a href="add-products.html" class="nav-link"><i class="ri-add-circle-line"></i> Add Products</a>
            <a href="plans.html" class="nav-link"><i class="ri-vip-diamond-line"></i> Plans</a>
            <a href="kyc.html" class="nav-link"><i class="ri-shield-check-line"></i> KYC</a>
            <a href="withdraw.html" class="nav-link"><i class="ri-bank-card-line"></i> Withdraw</a>
            <a href="support.html" class="nav-link"><i class="ri-customer-service-2-line"></i> Support</a>
      </ul>
</nav>

<div class="app-container">
    <header class="header-bar">
        <button class="menu-trigger" onclick="toggleSidebarView()"><i class="ri-menu-2-line"></i></button>
        <div style="flex:1;"></div>
        <button class="theme-trigger" onclick="toggleTheme()"><i class="ri-contrast-2-line"></i></button>
        <button class="logout-btn" onclick="logoutSystem()"><i class="ri-logout-box-line"></i> Logout</button>
    </header>

    <main class="stage-view">
        <div class="vip-matrix" id="metrics-summary-bar"></div>
        <div class="products-grid" id="activated-products-root">
            <div class="loader-backdrop"><div class="spinner-3d"></div></div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBfNKnkuPjWCO-KnqvZrfmrbfC44K0xOY8",
        authDomain: "koganstoree.firebaseapp.com",
        databaseURL: "https://koganstoree-default-rtdb.firebaseio.com",
        projectId: "koganstoree",
        storageBucket: "koganstoree.firebasestorage.app",
        messagingSenderId: "166010280262",
        appId: "1:166010280262:web:a29c6fc7b8251c9997ed47"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const userId = localStorage.getItem("seller_id");

    function start() {
        const activatedRef = ref(db, `seller_activated_products/${userId}`);
        const ordersRef = ref(db, `orders`);
        const productsRef = ref(db, `products`);
        
        onValue(activatedRef, (aSnap) => {
            onValue(ordersRef, (oSnap) => {
                onValue(productsRef, (pSnap) => {
                    const activated = aSnap.val() || {};
                    const orders = Object.values(oSnap.val() || {});
                    const products = pSnap.val() || {};
                    let totalOrders = 0;
                    let masterList = [];

                    Object.keys(activated).forEach(key => {
                        const item = activated[key];
                        const product = products[item.productId];
                        if (!product) return; 

                        const myOrders = orders.filter(o => o.ref === userId && o.productId === item.productId && o.status === "delivered");
                        totalOrders += myOrders.length;

                        masterList.push({
                            title: product.title,
                            image: product.image,
                            orderCount: myOrders.length,
                            liveUrl: `${location.origin}/product.html?id=${item.productId}&ref=${userId}`
                        });
                    });

                    renderMetrics(totalOrders, masterList.length);
                    renderProducts(masterList);
                });
            });
        });
    }

    function renderMetrics(orders, active) {
        document.getElementById("metrics-summary-bar").innerHTML = `
            <div class="vip-card metric-card">
                <div class="metric-label">Activated Products</div>
                <div class="metric-val">${active}</div>
            </div>
            <div class="vip-card metric-card">
                <div class="metric-label">Total Orders</div>
                <div class="metric-val">${orders}</div>
            </div>
        `;
    }

    function renderProducts(list) {
        const box = document.getElementById("activated-products-root");
        if (!list.length) { box.innerHTML = `<div class="vip-card" style="padding:40px;text-align:center;">No Products</div>`; return; }
        box.innerHTML = list.map(p => `
            <div class="vip-card product-vip-card">
                <div class="card-media-wrapper"><img src="${p.image}" class="card-thumb"></div>
                <div class="card-core-payload">
                    <div class="product-meta-title">${p.title}</div>
                    <div style="margin-bottom:10px; color:#00F2FE; font-weight:700;">Total Orders: ${p.orderCount}</div>
                    <div class="referral-asset-box">
                        <div class="referral-input-container">
                            <input class="referral-url-string" readonly value="${p.liveUrl}">
                            <button class="copy-trigger-btn" onclick="navigator.clipboard.writeText('${p.liveUrl}')"><i class="ri-file-copy-line"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    window.toggleSidebarView = () => {
        document.getElementById('sidebar-node').classList.toggle('visible');
        document.getElementById('sidebar-overlay-node').classList.toggle('visible');
    };

    window.logoutSystem = () => { localStorage.removeItem('seller_id'); window.location.href = 'auth.html'; };

    window.addEventListener("DOMContentLoaded", start);
</script>

</body>
</html>
