<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kogan Store - Transaction Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-base: #060608;
            --bg-surface: rgba(255, 255, 255, 0.02);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --text-main: #f3f4f6;
            --text-muted: #8e929b;
            --accent-gold: #d4af37;
            --accent-neon: #00ffcc;
            --accent-danger: #ff4a5a;
            --glass-blur: blur(20px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { background-color: var(--bg-base); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        #sidebar-backcloth { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 900; display: none; }

        aside { background: rgba(10, 10, 14, 0.85); border-right: 1px solid var(--border-subtle); backdrop-filter: var(--glass-blur); padding: 30px 20px; display: flex; flex-direction: column; gap: 30px; z-index: 999; position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        aside.mobile-open { left: 0; }
        .brand-zone { display: flex; align-items: center; justify-content: space-between; padding-left: 10px; }
        .brand-title { display: flex; align-items: center; gap: 12px; }
        .logo-icon { color: var(--accent-gold); font-size: 22px; }
        .brand-zone h1 { font-size: 18px; font-weight: 800; letter-spacing: 1px; }
        .close-sidebar-btn { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; display: block; }

        nav { display: flex; flex-direction: column; gap: 6px; flex-grow: 1; overflow-y: auto; }
        .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 12px; transition: all 0.2s ease; }
        .nav-item.active { border-left: 3px solid var(--accent-gold); background: linear-gradient(90deg, rgba(212, 175, 55, 0.05) 0%, rgba(255,255,255,0) 100%); color: var(--accent-gold); }
        .logout-btn { margin-top: auto; color: var(--accent-danger); border: 1px solid rgba(255, 74, 90, 0.15); cursor: pointer; }

        main { display: flex; flex-direction: column; min-height: 100vh; width: 100%; transition: padding-left 0.3s ease; }
        header { height: 75px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; padding: 0 20px; background: rgba(6, 6, 8, 0.4); backdrop-filter: var(--glass-blur); position: sticky; top: 0; z-index: 90; }
        .menu-toggle-btn { background: var(--bg-surface); border: 1px solid var(--border-subtle); color: #fff; width: 42px; height: 42px; border-radius: 10px; cursor: pointer; font-size: 18px; margin-right: 16px; }
        
        .workspace { padding: 20px; flex-grow: 1; max-width: 1600px; width: 100%; margin: 0 auto; }
        .glass-card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 20px; padding: 20px; margin-bottom: 24px; }
        
        /* Responsive Table Container */
        .table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; min-width: 600px; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { padding: 14px; color: var(--text-muted); font-weight: 700; border-bottom: 2px solid var(--border-subtle); text-transform: uppercase; font-size: 11px; }
        td { padding: 14px; border-bottom: 1px solid var(--border-subtle); color: var(--text-main); white-space: nowrap; }
        
        .btn-action { background: var(--bg-surface); border: 1px solid var(--border-subtle); color: var(--text-main); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; margin-right: 5px; white-space: nowrap; }
        .btn-action:hover { border-color: var(--accent-gold); }

        @media (min-width: 992px) { aside { left: 0 !important; } main { padding-left: 280px; } .menu-toggle-btn { display: none; } .close-sidebar-btn { display: none; } .workspace { padding: 40px; } }
    </style>
</head>
<body>

    <div id="sidebar-backcloth"></div>

    <div id="admin-panel">
        <aside id="app-sidebar">
            <div class="brand-zone">
                <div class="brand-title">
                    <i class="fa-solid fa-shield-halved logo-icon"></i>
                    <h1>CORE SYSTEM</h1>
                </div>
                <button class="close-sidebar-btn" id="btn-close-sidebar"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <nav>
                <a href="admin.html" class="nav-item"><i class="fa-solid fa-chart-pie"></i>Analytics Hub</a>
                <a href="Products-admin.html" class="nav-item"><i class="fa-solid fa-box-open"></i>Product Manager</a>
                <a href="Packages-admin.html" class="nav-item"><i class="fa-solid fa-layer-group"></i>Package Config</a>
                <a href="KYC-admin.html" class="nav-item"><i class="fa-solid fa-id-card"></i>KYC Verification</a>
                <a href="Transactions-admin.html" class="nav-item active"><i class="fa-solid fa-money-bill-transfer"></i>Transactions</a>
                <a href="Sellers-admin.html" class="nav-item"><i class="fa-solid fa-users-gear"></i>Active Sellers</a>
                <a href="Orders-admin.html" class="nav-item"><i class="fa-solid fa-cart-shopping"></i>Order Registry</a>
                <a href="Chat-admin.html" class="nav-item"><i class="fa-solid fa-comments"></i>Live Support</a>
          <a href="Payment-admin.html" class="nav-item active"><i class="fa-solid fa-wallet"></i>Payment Config</a>
              
                <div class="nav-item logout-btn" id="btn-logout"><i class="fa-solid fa-arrow-right-from-bracket"></i>Exit Session</div>
            </nav>
        </aside>

        <main>
            <header>
                <button class="menu-toggle-btn" id="btn-menu-toggle"><i class="fa-solid fa-bars"></i></button>
                <h2>Transaction Control Center</h2>
            </header>
            
            <div class="workspace">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px;">
                    <div class="glass-card">
                        <div style="color: var(--text-muted); font-size: 11px; text-transform: uppercase;">Pending Withdrawals</div>
                        <div id="stat-pend-with" style="font-size: 24px; font-weight: 800;">0</div>
                    </div>
                    <div class="glass-card">
                        <div style="color: var(--text-muted); font-size: 11px; text-transform: uppercase;">Successful Withdrawals</div>
                        <div id="stat-succ-with" style="font-size: 24px; font-weight: 800; color: var(--accent-neon);">0</div>
                    </div>
                    <div class="glass-card">
                        <div style="color: var(--text-muted); font-size: 11px; text-transform: uppercase;">Pending Deposits</div>
                        <div id="stat-pend-dep" style="font-size: 24px; font-weight: 800; color: var(--accent-gold);">0</div>
                    </div>
                    <div class="glass-card">
                        <div style="color: var(--text-muted); font-size: 11px; text-transform: uppercase;">Failed Transactions</div>
                        <div id="stat-failed" style="font-size: 24px; font-weight: 800; color: var(--accent-danger);">0</div>
                    </div>
                </div>

                <div id="transaction-container"></div>
            </div>
        </main>
    </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

    import {
        getDatabase,
        ref,
        onValue,
        update,
        remove,
        get
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBfNKnkuPjWCO-KnqvZrfmrbfC44K0xOY8",
        authDomain: "koganstoree.firebaseapp.com",
        databaseURL: "https://koganstoree-default-rtdb.firebaseio.com",
        projectId: "koganstoree",
        storageBucket: "koganstoree.firebasestorage.app",
        messagingSenderId: "166010280262",
        appId: "1:166010280262:web:a29c6fc7b8251c9997ed47",
        measurementId: "G-C2WRS6MQV0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Sidebar Toggle
    const toggleSidebar = (state) => {
        document.getElementById('app-sidebar')
            .classList.toggle('mobile-open', state);

        document.getElementById('sidebar-backcloth')
            .style.display = state ? 'block' : 'none';
    };

    document.getElementById('btn-menu-toggle')
        .addEventListener('click', () => toggleSidebar(true));

    document.getElementById('btn-close-sidebar')
        .addEventListener('click', () => toggleSidebar(false));

    document.getElementById('sidebar-backcloth')
        .addEventListener('click', () => toggleSidebar(false));

    // LIVE DATABASE
    onValue(ref(db), (snapshot) => {

        const data = snapshot.val() || {};

        const deposits = data.depositRequests || {};
        const withdraws = data.withdrawRequests || {};

        const pDep = Object.values(deposits)
            .filter(d => d.status === 'pending');

        const pWith = Object.values(withdraws)
            .filter(w => w.status === 'pending');

        const sWith = Object.values(withdraws)
            .filter(w => w.status === 'paid');

        const fDep = Object.values(deposits)
            .filter(d => d.status === 'failed');

        const fWith = Object.values(withdraws)
            .filter(w => w.status === 'failed');

        document.getElementById('stat-pend-with').innerText = pWith.length;

        document.getElementById('stat-succ-with').innerText = sWith.length;

        document.getElementById('stat-pend-dep').innerText = pDep.length;

        document.getElementById('stat-failed').innerText =
            fDep.length + fWith.length;

        renderSections(deposits, withdraws);

    });

    // RENDER TABLES
    function renderSections(deps, withs) {

        const container =
            document.getElementById('transaction-container');

        container.innerHTML = `

            ${createTable(
                "1. Pending Deposit Approval",
                Object.entries(deps)
                    .filter(([k,v]) => v.status === 'pending'),
                "depositRequests",
                ["User", "Email", "Plan", "ID", "Amount"],
                true
            )}

            ${createTable(
                "2. Pending Withdrawal Requests",
                Object.entries(withs)
                    .filter(([k,v]) => v.status === 'pending'),
                "withdrawRequests",
                ["Seller", "Email", "Method", "Details", "Amount"],
                true
            )}

            ${createTable(
                "3. Successful Deposits",
                Object.entries(deps)
                    .filter(([k,v]) => v.status === 'approved'),
                "depositRequests",
                ["User", "Email", "Plan", "Amount"],
                false
            )}

            ${createTable(
                "4. Successful Withdrawals",
                Object.entries(withs)
                    .filter(([k,v]) => v.status === 'paid'),
                "withdrawRequests",
                ["Seller", "Email", "Amount"],
                false
            )}

            ${createTable(
                "5. Failed Deposits",
                Object.entries(deps)
                    .filter(([k,v]) => v.status === 'failed'),
                "depositRequests",
                ["User", "Email", "Plan", "Amount"],
                false
            )}

            ${createTable(
                "6. Failed Withdrawals",
                Object.entries(withs)
                    .filter(([k,v]) => v.status === 'failed'),
                "withdrawRequests",
                ["Seller", "Email", "Amount"],
                false
            )}

        `;
    }

    // TABLE CREATOR
    function createTable(title, items, path, headers, actions) {

        const isDeposit =
            path === "depositRequests";

        return `
            <div class="glass-card">

                <h3 style="margin-bottom:15px;">
                    ${title}
                </h3>

                <div class="table-wrapper">

                    <table>

                        <thead>
                            <tr>

                                ${headers.map(h => `
                                    <th>${h}</th>
                                `).join('')}

                                ${actions ? `
                                    <th>Actions</th>
                                ` : ''}

                            </tr>
                        </thead>

                        <tbody>

                            ${items.length === 0 ? `
                                <tr>
                                    <td
                                        colspan="${headers.length + (actions ? 1 : 0)}"
                                        style="
                                            text-align:center;
                                            padding:30px;
                                            color:var(--text-muted);
                                        "
                                    >
                                        No Transactions Found
                                    </td>
                                </tr>
                            ` : ''}

                            ${items.map(([id, item]) => `

                                <tr>

                                    <!-- USER / SELLER -->
                                    <td>
                                        ${item.userName || item.sellerName || 'N/A'}
                                    </td>

                                    <!-- EMAIL -->
                                    ${headers.includes("Email") ? `
                                        <td>${item.email || '-'}</td>
                                    ` : ''}

                                    <!-- PLAN -->
                                    ${headers.includes("Plan") ? `
                                        <td>${item.plan || '-'}</td>
                                    ` : ''}

                                    <!-- TXN ID -->
                                    ${headers.includes("ID") ? `
                                        <td>${item.txnId || '-'}</td>
                                    ` : ''}

                                    <!-- METHOD -->
                                    ${headers.includes("Method") ? `
                                        <td>${item.method || '-'}</td>
                                    ` : ''}

                                    <!-- DETAILS -->
                                    ${headers.includes("Details") ? `
                                        <td>${item.details || '-'}</td>
                                    ` : ''}

                                    <!-- AMOUNT -->
                                    ${headers.includes("Amount") ? `
                                        <td>$${item.amount || 0}</td>
                                    ` : ''}

                                    ${actions ? `
                                        <td>

                                            <button
                                                class="btn-action"
                                                onclick="
                                                    window.updateStatus(
                                                        '${path}',
                                                        '${id}',
                                                        '${isDeposit ? 'approved' : 'paid'}'
                                                    )
                                                "
                                            >

                                                ${isDeposit ? 'Receive' : 'Pay'}

                                            </button>

                                            ${isDeposit ? `
                                                <button
                                                    class="btn-action"
                                                    onclick="
                                                        window.updateStatus(
                                                            '${path}',
                                                            '${id}',
                                                            'failed'
                                                        )
                                                    "
                                                >
                                                    Fail
                                                </button>
                                            ` : ''}

                                            <button
                                                class="btn-action"
                                                onclick="
                                                    window.removeItem(
                                                        '${path}',
                                                        '${id}'
                                                    )
                                                "
                                            >
                                                Delete
                                            </button>

                                        </td>
                                    ` : ''}

                                </tr>

                            `).join('')}

                        </tbody>

                    </table>

                </div>

            </div>
        `;
    }

    // UPDATE STATUS + AUTO ACTIVATE PLAN
    window.updateStatus = async (path, id, status) => {

        try {

            // UPDATE TRANSACTION STATUS
            await update(
                ref(db, `${path}/${id}`),
                { status }
            );

            // ONLY FOR DEPOSIT APPROVAL
            if (
                path === "depositRequests" &&
                status === "approved"
            ) {

                // GET DEPOSIT DATA
                const snapshot = await get(
                    ref(db, `${path}/${id}`)
                );

                if (!snapshot.exists()) {
                    alert("Deposit Not Found");
                    return;
                }

                const deposit = snapshot.val();

                // USER ID
                const userId =
                    deposit.email ||
                    deposit.username ||
                    deposit.userId;

                // PLAN
                const selectedPlan =
                    deposit.plan || "Silver Plan";

                if (!userId) {
                    alert("User ID Missing");
                    return;
                }

                // CLEAN PLAN NAME
                const cleanPlan = selectedPlan
                    .replace(" Plan", "")
                    .trim();

                // UPDATE USER PLAN
                await update(
                    ref(db, `users/${userId}`),
                    {
                        plan: cleanPlan,
                        activatedPlan: selectedPlan,
                        membershipStatus: "active",
                        planActivatedAt: Date.now()
                    }
                );

                console.log(
                    "User Plan Activated Successfully"
                );

            }

        } catch (error) {

            console.error(error);

            alert("Something Went Wrong");

        }

    };

    // DELETE TRANSACTION
    window.removeItem = (path, id) => {

        remove(ref(db, `${path}/${id}`));

    };

    // LOGOUT
    document.getElementById('btn-logout')
        .addEventListener('click', () => {

            localStorage.removeItem(
                'kogan_admin_authenticated'
            );

            window.location.href = 'admin.html';

        });

</script>
</body>
</html>
