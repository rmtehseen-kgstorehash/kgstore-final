<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Viewport locked to prevent manual zooming distortion layout breaks -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kogan | Add New Products</title>
    
    <!-- Premium Geometric Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Ultra VIP Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #030306;
            --glass-surface: rgba(13, 13, 20, 0.45);
            --glass-card: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-border-light: rgba(255, 255, 255, 0.12);
            
            /* VIP 3D Gradients */
            --glow-gold: linear-gradient(135deg, #FFE259 0%, #FFA751 100%);
            --glow-cyan: linear-gradient(135deg, #00F2FE 0%, #4FACFE 100%);
            --glow-neon: linear-gradient(135deg, #7F00FF 0%, #E100FF 100%);
            --text-gradient: linear-gradient(180deg, #FFFFFF 0%, #A0A0B5 100%);
            
            --text-main: #FFFFFF;
            --text-muted: #7E7E96;
            --shadow-3d: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        /* Fluid layout containment matrices */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        body {
            display: flex;
            position: relative;
        }

        /* Kinetic Light Fields background design elements */
        .ambient-field { position: absolute; border-radius: 50%; filter: blur(140px); z-index: -1; opacity: 0.35; animation: orbit 25s infinite alternate ease-in-out; pointer-events: none; }
        .field-gold { width: min(500px, 80vw); height: min(500px, 80vw); background: radial-gradient(circle, #FFA751 0%, transparent 70%); top: -150px; right: -100px; }
        .field-purple { width: min(600px, 90vw); height: min(600px, 90vw); background: radial-gradient(circle, #7F00FF 0%, transparent 70%); bottom: -200px; left: -150px; animation-delay: -10s; }

        @keyframes orbit {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { transform: translate(30px, 20px) scale(1.1) rotate(360deg); }
        }

        /* Premium Desktop Sidebar Layout Module */
        .sidebar {
            width: 290px;
            min-width: 290px;
            background: var(--glass-surface);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid var(--glass-border);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .brand-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 50px; padding-left: 12px; }
        .brand-logo-cube { width: 32px; height: 32px; background: var(--glow-cyan); border-radius: 8px; transform: rotate(45deg); box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }
        .brand-name { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; background: var(--glow-cyan); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .nav-list { list-style: none; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
        
        .nav-link {
            text-decoration: none;
            padding: 14px 18px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            border: 1px solid transparent;
        }

        .nav-link i { font-size: 20px; transition: transform 0.3s ease; }
        .nav-link:hover { color: var(--text-main); background: rgba(255, 255, 255, 0.02); border-color: var(--glass-border); }
        .nav-link:hover i { transform: translateX(3px); }
        
        .nav-link.active {
            color: var(--text-main);
            background: var(--glass-card);
            border-top: 1px solid var(--glass-border-light);
            border-left: 1px solid var(--glass-border-light);
            border-right: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--shadow-3d);
        }
        .nav-link.active i { color: #00F2FE; }

        /* Unified viewport content structural layout configuration */
        .app-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            max-width: 100%;
            overflow-x: hidden;
        }
        
        .header-bar {
            height: 90px;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(3, 3, 6, 0.3);
            backdrop-filter: blur(15px);
            z-index: 90;
        }

        .menu-trigger { display: none; background: none; border: none; color: white; font-size: 26px; cursor: pointer; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 950; }

        .profile-cluster { display: flex; align-items: center; gap: 16px; }
        .profile-badge-3d {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--glow-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.2);
            border-top: 1px solid rgba(255,255,255,0.4);
        }

        /* Dynamic Main Viewport Section containing zero structural dead zones */
        .stage-view { 
            flex: 1; 
            padding: 40px 48px; 
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* Premium CSS Grid Grid Stack System Layout */
        .vip-matrix { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 24px; 
            margin-bottom: 24px; 
            width: 100%;
        }
        
        .vip-card {
            background: var(--glass-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-border-light);
            border-left: 1px solid var(--glass-border-light);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow-3d);
        }

        /* Top Summary Statistics Layout */
        .metric-card { grid-column: span 3; }
        .metric-label { color: var(--text-muted); font-size: 13px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .metric-label i { font-size: 16px; }
        .metric-val { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; background: var(--text-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .metric-val.accentuated { background: var(--glow-cyan); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Search Filtering Panel Layout Wrapper */
        .control-panel-card { 
            grid-column: span 12; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 20px; 
            padding: 20px 24px;
        }
        .search-input-group { position: relative; flex: 1; max-width: 480px; }
        .search-input-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 18px; }
        .luxury-search-box { width: 100%; background: rgba(0,0,0,0.25); border: 1px solid var(--glass-border); border-radius: 14px; padding: 12px 16px 12px 48px; color: #fff; font-size: 14px; font-weight: 500; outline: none; transition: border-color 0.3s ease; }
        .luxury-search-box:focus { border-color: rgba(0, 242, 254, 0.4); }

        .filter-utilities { display: flex; align-items: center; gap: 16px; }
        .select-input-group { position: relative; }
        .luxury-select-menu { appearance: none; background: rgba(0,0,0,0.25); border: 1px solid var(--glass-border); border-radius: 14px; padding: 12px 40px 12px 16px; color: #fff; font-size: 14px; font-weight: 600; outline: none; cursor: pointer; min-width: 180px; transition: border-color 0.3s ease; }
        .luxury-select-menu:focus { border-color: rgba(0, 242, 254, 0.4); }
        .select-input-group::after { content: '\ea4c'; font-family: 'remixicon'; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; font-size: 14px; }

        /* Auto-Responsive Grid Matrix containing controlled layout spacing */
        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 24px; 
            width: 100%;
            margin-bottom: 24px;
        }
        
        .product-vip-card { padding: 0; overflow: hidden; display: flex; flex-direction: column; min-height: 440px; }
        
        .card-media-wrapper { width: 100%; height: 190px; position: relative; background: rgba(255,255,255,0.01); border-bottom: 1px solid var(--glass-border); overflow: hidden; }
        .card-thumb { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .product-vip-card:hover .card-thumb { transform: scale(1.04); }

        .status-badge { position: absolute; top: 14px; right: 14px; padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; z-index: 2; }
        .badge-instock { background: rgba(0, 242, 254, 0.15); border: 1px solid rgba(0, 242, 254, 0.3); color: #00F2FE; }
        .badge-nostock { background: rgba(255, 85, 85, 0.15); border: 1px solid rgba(255, 85, 85, 0.3); color: #ff5555; }
        
        .channels-tag-wrapper { position: absolute; bottom: 12px; left: 14px; display: flex; gap: 6px; flex-wrap: wrap; z-index: 2; }
        .channel-pill { background: rgba(3, 3, 6, 0.75); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08); padding: 4px 8px; border-radius: 6px; font-size: 9px; font-weight: 700; color: #A0A0B5; }

        .card-core-payload { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .product-meta-title { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; margin-bottom: 6px; color: var(--text-main); }
        .product-meta-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Card Pricing Row Flex Positioning Mappings */
        .pricing-tier-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.04); margin-top: auto; }
        .price-stack { display: flex; flex-direction: column; }
        .price-label { font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; }
        .actual-val { font-size: 18px; font-weight: 800; color: #fff; }
        .slash-val { font-size: 13px; color: var(--text-muted); text-decoration: line-through; margin-left: 4px; font-weight: 500; }
        .commission-stack { text-align: right; }
        .commission-val { font-size: 20px; font-weight: 800; background: var(--glow-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .action-trigger-btn { width: 100%; border: none; outline: none; padding: 12px; border-radius: 14px; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .btn-activate { background: var(--glow-cyan); color: #030306; box-shadow: 0 8px 20px rgba(0,242,254,0.15); border-top: 1px solid rgba(255,255,255,0.25); }
        .btn-activate:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,242,254,0.35); }

        /* Empty State Structural Layout Frame */
        .empty-matrix-canvas { grid-column: span 12; text-align: center; padding: 60px 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 340px; }
        .empty-icon-shield { width: 64px; height: 64px; border-radius: 20px; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--text-muted); margin-bottom: 16px; }
        .empty-heading { font-size: 20px; font-weight: 800; margin-bottom: 8px; background: var(--text-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .empty-subtext { color: var(--text-muted); font-size: 14px; max-width: 400px; line-height: 1.5; }

        /* Grid Data State Loading Backdrops */
        .loader-backdrop { display: flex; justify-content: center; align-items: center; padding: 60px 0; grid-column: span 12; width: 100%; }
        .spinner-3d { border: 3px solid rgba(255,255,255,0.03); border-top: 3px solid #00F2FE; border-radius: 50%; width: 40px; height: 40px; animation: cycle 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        @keyframes cycle { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .logout-btn { background: rgba(255, 50, 50, 0.1); border: 1px solid rgba(255, 50, 50, 0.3); color: #ff5555; padding: 8px 16px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .logout-btn:hover { background: rgba(255, 50, 50, 0.2); }

        /* Block Limit Notification Modal Windows */
        .modal-screen-blur { display: none; position: fixed; inset: 0; background: rgba(2,2,4,0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 2000; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity 0.3s ease; }
        .modal-screen-blur.visible { display: flex; opacity: 1; }
        .vip-modal-frame { width: 100%; max-width: 440px; padding: 32px; background: rgba(15, 15, 25, 0.85); border: 1px solid rgba(255,255,255,0.08); border-top: 1px solid rgba(255,255,255,0.2); border-radius: 24px; box-shadow: 0 40px 80px rgba(0,0,0,0.8); text-align: center; transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-screen-blur.visible .vip-modal-frame { transform: scale(1); }
        .modal-alert-icon { width: 64px; height: 64px; border-radius: 18px; background: rgba(255,167,81,0.1); border: 1px solid rgba(255,167,81,0.3); display: flex; align-items: center; justify-content: center; font-size: 28px; color: #FFA751; margin: 0 auto 20px; }
        .modal-title { font-size: 22px; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.5px; }
        .modal-body-text { color: var(--text-muted); font-size: 13px; line-height: 1.6; margin-bottom: 24px; }
        
        .modal-action-row { display: flex; gap: 12px; }
        .modal-btn-primary { flex: 1; text-decoration: none; background: var(--glow-gold); color: #030306; font-weight: 700; padding: 12px; border-radius: 12px; display: inline-block; font-size: 13px; transition: all 0.2s ease; border-top: 1px solid rgba(255,255,255,0.3); }
        .modal-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,167,81,0.3); }
        .modal-btn-secondary { flex: 1; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: #fff; font-weight: 600; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 13px; }
        .modal-btn-secondary:hover { background: rgba(255,255,255,0.08); }

        /* Floating Toast Notification Containers */
        .toast-notification-center { position: fixed; bottom: 24px; right: 24px; z-index: 3000; display: flex; flex-direction: column; gap: 10px; max-width: calc(100vw - 48px); }
        .toast-capsule { background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(0, 242, 254, 0.3); border-top: 1px solid rgba(255,255,255,0.15); padding: 14px 20px; border-radius: 14px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 10px; color: #fff; font-size: 13px; font-weight: 600; transform: translateY(40px); opacity: 0; animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { to { transform: translateY(0); opacity: 1; } }

        /* ==========================================================================
           CRITICAL MOBILE LAYER REFACTORS & VIEWPORT COMPRESSION MATRIX
           ========================================================================== */
        
        @media (max-width: 1400px) {
            .metric-card { grid-column: span 6; }
        }

        @media (max-width: 1024px) {
            .stage-view { padding: 32px; }
            .header-bar { padding: 0 32px; }
        }

        @media (max-width: 992px) { 
            .control-panel-card { flex-direction: column; align-items: stretch; gap: 16px; padding: 16px; } 
            .search-input-group { max-width: 100%; }
            .filter-utilities { display: grid; grid-template-columns: 1fr; width: 100%; }
            .luxury-select-menu { min-width: 100%; }
        }

        /* Fixed structural logic: Complete viewport isolation boundary controls */
        @media (max-width: 768px) {
            .sidebar { 
                position: fixed; 
                left: 0;
                top: 0;
                height: 100vh; 
                transform: translateX(-100%); /* Keeps navigation completely offscreen until toggled */
                box-shadow: 20px 0 40px rgba(0,0,0,0.8);
                transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            }
            .sidebar.visible { 
                transform: translateX(0); /* Slides cleanly into position without visual stretching */
            }
            .sidebar-overlay.visible { display: block; }
            .menu-trigger { display: block; }
            
            .metric-card { grid-column: span 12; }
            .header-bar { padding: 0 20px; height: 80px; min-height: 80px; }
            .stage-view { padding: 24px 20px; }
            .vip-matrix { gap: 16px; margin-bottom: 16px; }
            
            .products-grid { 
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
                gap: 16px; 
                margin-bottom: 20px;
            }
            .product-vip-card { min-height: auto; }
        }

        @media (max-width: 480px) {
            .profile-cluster span { display: none; }
            .header-bar { height: 70px; min-height: 70px; }
            .brand-meta { margin-bottom: 30px; }
            .modal-action-row { flex-direction: column; }
        }
    </style>
</head>
<body>

    <script>

        if (!currentAuthenticatedUser) { window.location.href = 'auth.html'; }

    <!-- Navigation Sidebar Layout Shell -->
    <nav class="sidebar" id="sidebar-node">

    <!-- App Main Viewport Module -->

        <header class="header-bar">

    <div class="modal-screen-blur" id="limit-warning-modal">

            <div class="modal-alert-icon"><i class="ri-error-warning-line"></i></div>
            <h2 class="modal-title">Allocation Cap Reached</h2>

                <button class="modal-btn-secondary" onclick="closeLimitModal()">Dismiss</button>

    <!-- Floating System Toast Component Target Holder -->
    <div class="toast-notification-center" id="toast-reservoir"></div>

    <!-- Firebase Modular System Integration Engine Script -->
 <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
    getDatabase, 
    ref, 
    get, 
    set 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBfNKnkuPjWCO-KnqvZrfmrbfC44K0xOY8",
    authDomain: "koganstoree.firebaseapp.com",
    databaseURL: "https://koganstoree-default-rtdb.firebaseio.com",
    projectId: "koganstoree",
    storageBucket: "koganstoree.firebasestorage.app",
    messagingSenderId: "166010280262",
    appId: "1:166010280262:web:a29c6fc7b8251c9997ed47",
    measurementId: "G-C2WRS6MQV0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* =========================================================
   GLOBAL STATES
========================================================= */

const currentAuthenticatedUser = localStorage.getItem("seller_id");

if (!currentAuthenticatedUser) {
    window.location.href = "auth.html";
}

let globalProductsCollection = {};
let tierProductsCollection = {};

let activeSellerActivatedList = [];

let sellerCurrentPlan = "Silver";
let sellerPlanLimitThreshold = 25;
let activeActivationCounter = 0;

/* =========================================================
   FIX MOBILE BLANK SPACE + RESPONSIVE BUG
========================================================= */

document.documentElement.style.width = "100%";
document.documentElement.style.overflowX = "hidden";

document.body.style.width = "100%";
document.body.style.maxWidth = "100vw";
document.body.style.overflowX = "hidden";

/* =========================================================
   PLAN CHANNEL ACCESS
========================================================= */

const levelChannelHierarchyPermissions = {
    Silver: [
        "Silver Plan",
        
    ],

    Gold: [
        "Silver Plan",
        "Gold Plan",
        
    ],

    Platinum: [
        "Silver Plan",
        "Gold Plan",
        "Platinum Plan",
        
    ],

    Diamond: [
        "Silver Plan",
        "Gold Plan",
        "Platinum Plan",
        "Diamond Plan",
        
    ]
};

/* =========================================================
   UI FUNCTIONS
========================================================= */

window.logoutSystem = function () {
    localStorage.removeItem("seller_id");
    window.location.href = "auth.html";
};

window.toggleSidebarView = function () {
    document.getElementById("sidebar-node")?.classList.toggle("visible");
    document.getElementById("sidebar-overlay-node")?.classList.toggle("visible");
};

window.closeLimitModal = function () {
    const modalNode = document.getElementById("limit-warning-modal");

    if (!modalNode) return;

    modalNode.style.opacity = "0";

    setTimeout(() => {
        modalNode.classList.remove("visible");
    }, 300);
};

window.openLimitModal = function () {
    const modalNode = document.getElementById("limit-warning-modal");

    if (!modalNode) return;

    modalNode.classList.add("visible");

    setTimeout(() => {
        modalNode.style.opacity = "1";
    }, 10);
};

/* =========================================================
   MAIN INITIALIZER
========================================================= */

async function constructCatalogInterfaceEngine() {

    try {

        const [
            userSnap,
            configSnap,
            activatedProductsSnap,
            productsSnap,
            tierProductsSnap
        ] = await Promise.all([

            get(ref(db, `users/${currentAuthenticatedUser}`)),

            get(ref(db, "system_plans_config")),

            get(ref(db, `seller_activated_products/${currentAuthenticatedUser}`)),

            get(ref(db, "products")),

            get(ref(db, "products_tier_distribution"))
        ]);

        /* =====================================================
           USER
        ===================================================== */

        if (userSnap.exists()) {

            const userData = userSnap.val();

            sellerCurrentPlan = userData.plan || "Silver";

            const profileTarget = document.getElementById("topbar-profile-target");

            if (profileTarget) {

                profileTarget.innerHTML = `
                    <span style="font-size:14px;font-weight:700;color:#fff;">
                        ${userData.name || "Partner"}
                    </span>

                    <div class="profile-badge-3d">
                        ${(userData.name || "P").charAt(0).toUpperCase()}
                    </div>
                `;
            }
        }

        /* =====================================================
           PLAN LIMITS
        ===================================================== */

        if (configSnap.exists()) {

            const configData = configSnap.val();

            const normalizedPlan = sellerCurrentPlan.toLowerCase();

            if (configData[normalizedPlan]) {

                sellerPlanLimitThreshold =
                    parseInt(
                        configData[normalizedPlan].limit
                    ) || 25;

            } else {

                applyLocalTierFallbackMatrix();
            }

        } else {

            applyLocalTierFallbackMatrix();
        }

        /* =====================================================
           ACTIVATED PRODUCTS
        ===================================================== */

        activeSellerActivatedList = [];

        if (activatedProductsSnap.exists()) {

            activeSellerActivatedList =
                Object.keys(activatedProductsSnap.val());
        }

        activeActivationCounter =
            activeSellerActivatedList.length;

        renderTopSummaryMetricsBar();

        /* =====================================================
           DATABASE COLLECTIONS
        ===================================================== */

        globalProductsCollection =
            productsSnap.exists()
                ? productsSnap.val()
                : {};

        tierProductsCollection =
            tierProductsSnap.exists()
                ? tierProductsSnap.val()
                : {};

        triggerCatalogFilteringPipeline();

    } catch (error) {

        console.error(error);

        document.getElementById("catalog-products-root").innerHTML = `
            <div class="vip-card" style="padding:40px;text-align:center;">
                <h2 style="color:#ff4d4d;">
                    Failed To Load Products
                </h2>
            </div>
        `;
    }
}

/* =========================================================
   FALLBACK LIMITS
========================================================= */

function applyLocalTierFallbackMatrix() {

    const limits = {
        Silver: 25,
        Gold: 80,
        Platinum: 300,
        Diamond: 800
    };

    sellerPlanLimitThreshold =
        limits[sellerCurrentPlan] || 25;
}

/* =========================================================
   METRICS
========================================================= */

function renderTopSummaryMetricsBar() {

    const barContainer =
        document.getElementById("allocation-summary-bar");

    if (!barContainer) return;

    const remaining =
        Math.max(
            0,
            sellerPlanLimitThreshold - activeActivationCounter
        );

    barContainer.innerHTML = `
        <div class="vip-card metric-card">
            <div class="metric-label">
                Current Plan
            </div>

            <div class="metric-val accentuated">
                ${sellerCurrentPlan}
            </div>
        </div>

        <div class="vip-card metric-card">
            <div class="metric-label">
                Activated
            </div>

            <div class="metric-val">
                ${activeActivationCounter} / ${sellerPlanLimitThreshold}
            </div>
        </div>

        <div class="vip-card metric-card">
            <div class="metric-label">
                Available Slots
            </div>

            <div class="metric-val">
                ${remaining}
            </div>
        </div>
    `;
}

/* =========================================================
   FILTER PRODUCTS
========================================================= */

window.triggerCatalogFilteringPipeline = function () {

    const query =
        document.getElementById("catalog-search-field")
        ?.value
        ?.toLowerCase()
        ?.trim() || "";

    const selectedChannel =
        document.getElementById("channel-filter-menu")
        ?.value || "ALL";

    const container =
        document.getElementById("catalog-products-root");

    if (!container) return;

    let html = "";
    let total = 0;

    const mergedProducts = {
        ...globalProductsCollection,
        ...tierProductsCollection
    };

    for (const productId in mergedProducts) {

        if (activeSellerActivatedList.includes(productId)) {
            continue;
        }

        const product = mergedProducts[productId];

        /* =====================================================
           CHANNELS
        ===================================================== */

        let channels = [];

        if (Array.isArray(product.channels)) {

            channels = product.channels;

        } else if (typeof product.channels === "string") {

            channels =
                product.channels
                .split(",")
                .map(item => item.trim());
        }

        const planPermissions =
            levelChannelHierarchyPermissions[sellerCurrentPlan]
            || [];

        const hasAccess =
            channels.some(channel =>
                planPermissions.includes(channel)
            );

        if (!hasAccess) continue;

        /* =====================================================
           FILTER
        ===================================================== */

        if (
            selectedChannel !== "ALL" &&
            !channels.includes(selectedChannel)
        ) {
            continue;
        }

        const title =
            (product.title || "").toLowerCase();

        const desc =
            (product.desc || "").toLowerCase();

        if (
            query &&
            !title.includes(query) &&
            !desc.includes(query)
        ) {
            continue;
        }

        /* =====================================================
           PRICING
        ===================================================== */

        const productPrice =
            parseFloat(
                product.discountPrice ||
                product.price ||
                0
            );

        const commissionMatrix = {
            Silver: 0.05,
            Gold: 0.10,
            Platinum: 0.20,
            Diamond: 0.25
        };

        const commissionRate =
            commissionMatrix[sellerCurrentPlan] || 0.05;

        const estimatedProfit =
            productPrice * commissionRate;

        const stock =
            parseInt(product.stock || 1);

        const inStock = stock > 0;

        total++;

        html += `
            <div class="vip-card product-vip-card">

                <div class="card-media-wrapper">

                    <img 
                        src="${product.image || ""}" 
                        class="card-thumb"
                    >

                    <span class="status-badge ${inStock ? "badge-instock" : "badge-nostock"}">
                        ${inStock ? "In Stock" : "Out Of Stock"}
                    </span>

                    <div class="channels-tag-wrapper">
                        ${channels.map(ch => `
                            <span class="channel-pill">
                                ${ch}
                            </span>
                        `).join("")}
                    </div>

                </div>

                <div class="card-core-payload">

                    <h3 class="product-meta-title">
                        ${product.title || "Product"}
                    </h3>

                    <p class="product-meta-desc">
                        ${product.desc || ""}
                    </p>

                    <div class="pricing-tier-row">

                        <div class="price-stack">
                            <span class="price-label">
                                Price
                            </span>

                            <div class="actual-val">
                                $${productPrice}
                            </div>
                        </div>

                        <div class="commission-stack">
                            <span class="price-label">
                                Profit
                            </span>

                            <div class="commission-val">
                                +$${estimatedProfit.toFixed(2)}
                            </div>
                        </div>

                    </div>

                    <button 
                        class="action-trigger-btn btn-activate"
                        onclick="executeProductActivationSequence('${productId}', ${estimatedProfit})"
                    >
                        Activate Product
                    </button>

                </div>

            </div>
        `;
    }

    if (total === 0) {

        container.innerHTML = `
            <div class="vip-card empty-matrix-canvas">
                <h2 class="empty-heading">
                    No Products Available
                </h2>

                <p class="empty-subtext">
                    No Products Found For Your Current Plan.
                </p>
            </div>
        `;

    } else {

        container.innerHTML = html;
    }
};

/* =========================================================
   ACTIVATE PRODUCT
========================================================= */

window.executeProductActivationSequence = async function (
    productId,
    profit
) {

    try {

        /* =========================================================
           KYC CHECK
        ========================================================= */

        const kycSnap = await get(ref(db, `kycRequests`));

        let isKycApproved = false;

        if (kycSnap.exists()) {

            const kycData = kycSnap.val();

            Object.keys(kycData).forEach(key => {

                const request = kycData[key];

                if (
                    request &&
                    request.status &&
                    request.status.toLowerCase() === "approved" &&
                    (
                        request.userId === currentAuthenticatedUser ||
                        request.email === currentAuthenticatedUser ||
                        request.username === currentAuthenticatedUser
                    )
                ) {
                    isKycApproved = true;
                }

            });

        }

        if (!isKycApproved) {

            alert("KYC Not Approved. You Cannot Activate Any Product.");

            return;
        }

        /* =========================================================
           PLAN LIMIT CHECK
        ========================================================= */

        if (
            activeActivationCounter >=
            sellerPlanLimitThreshold
        ) {

            document.getElementById(
                "modal-description-target"
            ).innerText =
                `You Reached Your ${sellerCurrentPlan} Plan Limit.`;

            openLimitModal();

            return;
        }

        /* =========================================================
           CREATE REFERRAL LINK
        ========================================================= */

        const referralLink =
            `${window.location.origin}/product.html?id=${productId}&ref=${currentAuthenticatedUser}`;

        /* =========================================================
           ACTIVATION PAYLOAD
        ========================================================= */

        const payload = {
            activatedAt: Date.now(),
            plan: sellerCurrentPlan,
            productId,
            profit,
            referralLink,
            totalClicks: 0,
            totalOrders: 0
        };

        /* =========================================================
           SAVE ACTIVATED PRODUCT
        ========================================================= */

        await set(
            ref(
                db,
                `seller_activated_products/${currentAuthenticatedUser}/${productId}`
            ),
            payload
        );

        instantiateSystemAlertToast();

        await constructCatalogInterfaceEngine();

    } catch (error) {

        console.error(error);

        alert(error.message);
    }
};
/* =========================================================
   TOAST
========================================================= */

function instantiateSystemAlertToast() {

    const toastReservoir =
        document.getElementById("toast-reservoir");

    if (!toastReservoir) return;

    const toast = document.createElement("div");

    toast.className = "toast-capsule";

    toast.innerHTML = `
        <i class="ri-checkbox-circle-fill"></i>
        Product Activated Successfully
    `;

    toastReservoir.appendChild(toast);

    setTimeout(() => {

        toast.style.opacity = "0";
        toast.style.transform = "translateY(-20px)";

        setTimeout(() => {
            toast.remove();
        }, 400);

    }, 3000);
}

/* =========================================================
   PAGE LOAD
========================================================= */

window.addEventListener(
    "DOMContentLoaded",
    constructCatalogInterfaceEngine
);
</script>

<script>
const targetRouteFile =
    window.location.pathname.split("/").pop();

document.querySelectorAll(".nav-link").forEach(linkNode => {

    if (
        linkNode.getAttribute("href") === targetRouteFile
    ) {

        linkNode.classList.add("active");

    } else {

        linkNode.classList.remove("active");
    }
});
</script>
</body>
</html>
