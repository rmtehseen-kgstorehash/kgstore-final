<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kogan | Elite Partner Portal</title>
    
    <!-- Premium Geometric Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Ultra VIP Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #030306;
            --glass-surface: rgba(13, 13, 20, 0.45);
            --glass-card: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-border-light: rgba(255, 255, 255, 0.12);
            
            /* VIP 3D Gradients */
            --glow-gold: linear-gradient(135deg, #FFE259 0%, #FFA751 100%);
            --glow-cyan: linear-gradient(135deg, #00F2FE 0%, #4FACFE 100%);
            --glow-neon: linear-gradient(135deg, #7F00FF 0%, #E100FF 100%);
            --text-gradient: linear-gradient(180deg, #FFFFFF 0%, #A0A0B5 100%);
            
            --text-main: #FFFFFF;
            --text-muted: #7E7E96;
            --shadow-3d: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 3D Kinetic Light Fields */
        .ambient-field { position: absolute; border-radius: 50%; filter: blur(140px); z-index: -1; opacity: 0.45; animation: orbit 25s infinite alternate ease-in-out; }
        .field-gold { width: 500px; height: 500px; background: radial-gradient(circle, #FFA751 0%, transparent 70%); top: -150px; right: -100px; }
        .field-purple { width: 600px; height: 600px; background: radial-gradient(circle, #7F00FF 0%, transparent 70%); bottom: -200px; left: -150px; animation-delay: -10s; }

        @keyframes orbit {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { transform: translate(60px, 40px) scale(1.15) rotate(360deg); }
        }

        /* Persistent Premium Sidebar */
        .sidebar {
            width: 290px;
            background: var(--glass-surface);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid var(--glass-border);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .brand-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 50px; padding-left: 12px; }
        .brand-logo-cube { width: 32px; height: 32px; background: var(--glow-cyan); border-radius: 8px; transform: rotate(45deg); box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }
        .brand-name { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; background: var(--glow-cyan); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .nav-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
        
        /* Fixed Redirect Link Design */
        .nav-link {
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            border: 1px solid transparent;
        }

        .nav-link i { font-size: 20px; transition: transform 0.3s ease; }
        .nav-link:hover { color: var(--text-main); background: rgba(255, 255, 255, 0.02); border-color: var(--glass-border); }
        .nav-link:hover i { transform: translateX(3px); }
        
        .nav-link.active {
            color: var(--text-main);
            background: var(--glass-card);
            border-top: 1px solid var(--glass-border-light);
            border-left: 1px solid var(--glass-border-light);
            border-right: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--shadow-3d);
        }
        .nav-link.active i { color: #00F2FE; }

        /* Structural Layout Matrix */
        .app-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        .header-bar {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(3, 3, 6, 0.3);
            backdrop-filter: blur(15px);
            z-index: 90;
        }

        .menu-trigger { display: none; background: none; border: none; color: white; font-size: 26px; cursor: pointer; }

        .profile-cluster { display: flex; align-items: center; gap: 16px; cursor: pointer; }
        .profile-badge-3d {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--glow-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.2);
            border-top: 1px solid rgba(255,255,255,0.4);
        }

        .stage-view { flex: 1; padding: 48px; overflow-y: auto; scroll-behavior: smooth; }

        /* Premium 3D Glass Cards */
        .vip-matrix { display: grid; grid-template-columns: repeat(12, 1fr); gap: 28px; }
        
        .vip-card {
            background: var(--glass-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-border-light);
            border-left: 1px solid var(--glass-border-light);
            border-radius: 28px;
            padding: 32px;
            box-shadow: var(--shadow-3d);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s ease, box-shadow 0.4s ease;
        }
        .vip-card:hover { 
            transform: translateY(-6px) scale(1.01); 
            border-color: rgba(0, 242, 254, 0.25);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 30px rgba(0, 242, 254, 0.05);
        }

        /* Hero Modules */
        .hero-banner { grid-column: span 8; display: flex; flex-direction: column; justify-content: center; min-height: 200px; }
        .hero-name { font-size: 34px; font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; background: var(--text-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-quote { color: var(--text-muted); font-size: 15px; font-weight: 500; line-height: 1.6; font-style: italic; border-left: 3px solid #00F2FE; padding-left: 16px; }

        .tier-pod { grid-column: span 4; display: flex; flex-direction: column; justify-content: space-between; align-items: flex-start; }
        .tier-pill { padding: 8px 18px; border-radius: 20px; font-size: 12px; font-weight: 800; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .tier-pill.active { background: rgba(0, 242, 254, 0.1); border: 1px solid rgba(0, 242, 254, 0.3); color: #00F2FE; box-shadow: 0 0 20px rgba(0, 242, 254, 0.1); }

        /* Micro Metrics Layout */
        .metric-card { grid-column: span 3; position: relative; overflow: hidden; }
        .metric-label { color: var(--text-muted); font-size: 14px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .metric-label i { font-size: 18px; color: var(--text-muted); }
        .metric-val { font-size: 36px; font-weight: 800; letter-spacing: -1px; background: var(--text-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .metric-val.accentuated { background: var(--glow-cyan); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Interactive Elements */
        .loader-backdrop { display: flex; justify-content: center; align-items: center; padding: 60px 0; width: 100%; }
        .spinner-3d { border: 3px solid rgba(255,255,255,0.03); border-top: 3px solid #00F2FE; border-radius: 50%; width: 44px; height: 44px; animation: cycle 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        @keyframes cycle { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Logout Button */
        .logout-btn { background: rgba(255, 50, 50, 0.1); border: 1px solid rgba(255, 50, 50, 0.3); color: #ff5555; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .logout-btn:hover { background: rgba(255, 50, 50, 0.2); }

        /* Responsive Matrix */
        @media (max-width: 1200px) {
            .metric-card { grid-column: span 6; }
            .hero-banner, .tier-pod { grid-column: span 12; }
        }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -290px; height: 100%; }
            .sidebar.visible { transform: translateX(290px); }
            .menu-trigger { display: block; }
            .metric-card { grid-column: span 12; }
            .header-bar { padding: 0 24px; }
            .stage-view { padding: 24px; }
        }
    </style>
</head>
<body>

    <!-- SECURE AUTHENTICATION GUARD -->
    <script>
        const currentAuthenticatedUser = localStorage.getItem('seller_id');
        if (!currentAuthenticatedUser) {
            window.location.href = 'auth.html';
        }
    </script>

    <!-- Background Ambience Fields -->
    <div class="ambient-field field-gold"></div>
    <div class="ambient-field field-purple"></div>

    <!-- Direct Navigation Sidebar Shell -->
    <nav class="sidebar" id="sidebar-node">
        <div class="brand-meta">
            <div class="brand-logo-cube"></div>
            <span class="brand-name">Kogan</span>
        </div>
        <ul class="nav-list">
            <a href="dashboard.html" class="nav-link"><i class="ri-dashboard-3-line"></i> Dashboard</a>
            <a href="activated-products.html" class="nav-link"><i class="ri-shopping-bag-3-line"></i> Activated Products</a>
            <a href="add-products.html" class="nav-link"><i class="ri-add-circle-line"></i> Add Products</a>
            <a href="plans.html" class="nav-link"><i class="ri-vip-diamond-line"></i> Plans</a>
            <a href="kyc.html" class="nav-link"><i class="ri-shield-check-line"></i> KYC</a>
            <a href="withdraw.html" class="nav-link"><i class="ri-bank-card-line"></i> Withdraw</a>
            <a href="support.html" class="nav-link"><i class="ri-customer-service-2-line"></i> Support</a>
        </ul>
    </nav>

    <!-- App Viewport Container -->
    <div class="app-container">
        <header class="header-bar">
            <button class="menu-trigger" onclick="toggleSidebarView()"><i class="ri-menu-2-line"></i></button>
            <div style="flex: 1;"></div>
            <div class="profile-cluster">
                <div id="topbar-profile-target" style="display:flex; align-items:center; gap:16px;"></div>
                <button class="logout-btn" onclick="logoutSystem()"><i class="ri-logout-box-line"></i> Logout</button>
            </div>
        </header>

        <!-- Dynamic Metrics Injection Stage -->
        <main class="stage-view" id="spa-stage">
            <div class="loader-backdrop"><div class="spinner-3d"></div></div>
        </main>
    </div>

    <!-- Firebase System Module & Interface Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfNKnkuPjWCO-KnqvZrfmrbfC44K0xOY8",
            authDomain: "koganstoree.firebaseapp.com",
            databaseURL: "https://koganstoree-default-rtdb.firebaseio.com",
            projectId: "koganstoree",
            storageBucket: "koganstoree.firebasestorage.app",
            messagingSenderId: "166010280262",
            appId: "1:166010280262:web:a29c6fc7b8251c9997ed47",
            measurementId: "G-C2WRS6MQV0"
        };
        
        const firebaseApp = initializeApp(firebaseConfig);
        const db = getDatabase(firebaseApp);

        const motivationalQuotes = [
            "Scale structural logic seamlessly, maximize dynamic conversion fields.",
            "Precision execution architecture drives systemic global performance assets.",
            "High performance yields automated transactional scale without latency boundaries.",
            "System architecture is defined by execution precision, not decorative layouts."
        ];

        window.logoutSystem = function() {
            localStorage.removeItem('seller_id');
            window.location.href = 'auth.html';
        };

        window.toggleSidebarView = function() {
            document.getElementById('sidebar-node').classList.toggle('visible');
        };

        // Real-time Metrics Processing Pipeline
        async function renderDashboardMetrics() {
            const stage = document.getElementById('spa-stage');
            stage.innerHTML = '<div class="loader-backdrop"><div class="spinner-3d"></div></div>';

            try {
                const [userSnap, activeProductsSnap] = await Promise.all([
                    get(ref(db, `users/${currentAuthenticatedUser}`)),
                    get(ref(db, `seller_activated_products/${currentAuthenticatedUser}`))
                ]);

                if (!userSnap.exists()) {
                    throw new Error("User structure node path missing in Real-time Database tree.");
                }

                const userData = userSnap.val();
                
                let activeCount = 0;
                let totalRevenue = 0;
                let totalSales = userData.totalSales || 0;

                if (activeProductsSnap.exists()) {
                    const products = activeProductsSnap.val();
                    activeCount = Object.keys(products).length;
                    
                    Object.values(products).forEach(p => {
                        totalRevenue += parseFloat(p.profit || 0);
                    });
                }

                const randomQuote = motivationalQuotes[Math.floor(Math.random() * motivationalQuotes.length)];
                
                document.getElementById('topbar-profile-target').innerHTML = `
                    <span style="font-size: 14px; font-weight: 700; color: #FFFFFF;">${userData.name || 'Partner'}</span>
                    <div class="profile-badge-3d">${(userData.name || 'P').charAt(0).toUpperCase()}</div>
                `;

                stage.innerHTML = `
                    <div class="vip-matrix">
                        <div class="vip-card hero-banner">
                            <h1 class="hero-name">Welcome Back, <span style="background: var(--glow-cyan); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">${userData.name || 'Valued Partner'}</span></h1>
                            <p class="hero-quote">"${randomQuote}"</p>
                        </div>

                        <div class="vip-card tier-pod">
                            <div class="tier-pill active"><i class="ri-vip-crown-fill"></i> ${userData.plan || 'Silver'} PLAN</div>
                            <div>
                                <p style="color: var(--text-muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;">Account Status</p>
                                <h3 style="font-size: 22px; font-weight: 700; color: #00F2FE;">Verified Engine</h3>
                            </div>
                        </div>

                        <div class="vip-card metric-card">
                            <div class="metric-label"><i class="ri-wallet-3-line"></i> Current Balance</div>
                            <div class="metric-val accentuated">$${parseFloat(userData.balance || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                        </div>

                        <div class="vip-card metric-card">
                            <div class="metric-label"><i class="ri-copper-coin-line"></i> Total Revenue</div>
                            <div class="metric-val">$${parseFloat(totalRevenue).toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                        </div>

                        <div class="vip-card metric-card">
                            <div class="metric-label"><i class="ri-checkbox-multiple-line"></i> Activated Products</div>
                            <div class="metric-val">${activeCount}</div>
                        </div>

                        <div class="vip-card metric-card">
                            <div class="metric-label"><i class="ri-route-line"></i> Total Sales</div>
                            <div class="metric-val">${totalSales}</div>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error("Dashboard connection error:", error);
                stage.innerHTML = `
                    <div class="vip-card" style="grid-column: span 12; text-align: center;">
                        <i class="ri-error-warning-line" style="font-size: 40px; color: #ff5555; margin-bottom: 15px; display: block;"></i>
                        <h3 style="color: #ff5555; margin-bottom: 10px;">Database Connection Exception</h3>
                        <p style="color: var(--text-muted); font-size: 12px; margin-top: 10px;">Trace: ${error.message}</p>
                    </div>
                `;
            }
        }

        window.addEventListener('DOMContentLoaded', renderDashboardMetrics);
    </script>

    <!-- AUTOMATIC PAGE-MATCHING ACTIVE LINK SCRIPT -->
    <script>
        // Reads current file name and matches it with sidebar links to light it up
        const targetRouteFile = window.location.pathname.split("/").pop();
        document.querySelectorAll('.nav-link').forEach(linkNode => {
            if (linkNode.getAttribute('href') === targetRouteFile) {
                linkNode.classList.add('active');
            } else {
                linkNode.classList.remove('active');
            }
        });
    </script>
</body>
</html>
