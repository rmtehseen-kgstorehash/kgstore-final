<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kogan | Elite Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030305; --glass: rgba(255, 255, 255, 0.03); --gold: #d4af37; --neon: #00ffcc; --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: #030305; background-image: radial-gradient(circle at 80% 20%, #2a2200 0%, transparent 40%), radial-gradient(circle at 20% 80%, #00332a 0%, transparent 40%); color: white; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-container { width: 100%; max-width: 420px; padding: 40px; background: var(--glass); backdrop-filter: blur(30px); border: 1px solid var(--border); border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
        h2 { font-size: 32px; margin-bottom: 20px; text-align: center; color: var(--gold); }
        .info-bar { background: rgba(212, 175, 55, 0.05); border: 1px solid var(--gold); border-radius: 12px; padding: 12px; font-size: 11px; color: var(--gold); margin-bottom: 20px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 8px 0; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 15px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: var(--gold); border: none; border-radius: 15px; color: black; font-weight: 800; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { transform: scale(1.02); opacity: 0.9; }
        .toggle-btn { text-align: center; margin-top: 20px; font-size: 13px; color: #666; }
        .toggle-btn span { color: var(--neon); cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2 id="title">Seller Login</h2>
    
    <div id="signup-fields" style="display:none;">
        <div class="info-bar">⚠️ SIGNING UP AS A VERIFIED SELLER</div>
        <input type="text" id="name" placeholder="Full Name">
        <input type="text" id="username-reg" placeholder="Choose Username">
        <input type="email" id="email" placeholder="Email Address">
    </div>

    <div id="login-fields">
        <input type="text" id="login-email" placeholder="Email">
    </div>
    
    <input type="password" id="password" placeholder="Password">
    
    <button id="main-btn">LOGIN TO PORTAL</button>
    <div class="toggle-btn" id="toggle-text">New here? <span id="toggle-link">Create Seller Account</span></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBfNKnkuPjWCO-KnqvZrfmrbfC44K0xOY8",
    authDomain: "koganstoree.firebaseapp.com",
    databaseURL: "https://koganstoree-default-rtdb.firebaseio.com",
    projectId: "koganstoree",
    storageBucket: "koganstoree.firebasestorage.app",
    messagingSenderId: "166010280262",
    appId: "1:166010280262:web:a29c6fc7b8251c9997ed47",
    measurementId: "G-C2WRS6MQV0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let isLogin = true;

/* =========================
   SAFE DOM HELPER
========================= */
function el(id) {
    return document.getElementById(id);
}

/* =========================
   TOGGLE SYSTEM (FIXED)
========================= */
function bindToggle() {
    const toggleLink = el('toggle-link');

    if (!toggleLink) return;

    toggleLink.onclick = () => {
        isLogin = !isLogin;

        el('title').innerText = isLogin
            ? 'Seller Login'
            : 'Seller Sign Up';

        el('main-btn').innerText = isLogin
            ? 'LOGIN TO PORTAL'
            : 'COMPLETE REGISTRATION';

        el('signup-fields').style.display = isLogin ? 'none' : 'block';
        el('login-fields').style.display = isLogin ? 'block' : 'none';

        el('toggle-text').innerHTML = isLogin
            ? "New here? <span id='toggle-link'>Create Seller Account</span>"
            : "Already a member? <span id='toggle-link'>Login</span>";

        bindToggle(); // rebind after DOM change
    };
}

window.addEventListener('load', bindToggle);

/* =========================
   MAIN AUTH BUTTON
========================= */
document.addEventListener('click', async (e) => {
    if (e.target && e.target.id === 'main-btn') {

        /* =====================
           SIGNUP
        ===================== */
        if (!isLogin) {

            const username = el('username-reg')?.value?.trim();
            const name = el('name')?.value?.trim();
            const email = el('email')?.value?.trim();
            const password = el('password')?.value?.trim();

            if (!username || !name || !email || !password) {
                return alert("Please Fill All Fields");
            }

            const userRef = ref(db, 'users/' + username);
            const snapshot = await get(userRef);

            if (snapshot.exists()) {
                return alert("Username Already Exists");
            }

            await set(userRef, {
                username,
                name,
                email,
                password,

                plan: "Silver",
                activatedPlan: "Silver Plan",
                membershipStatus: "active",

                balance: 0,
                totalSales: 0,

                // 🔥 KYC FIX (IMPORTANT)
                kycStatus: "not_submitted",

                createdAt: new Date().toISOString()
            });

            alert("Registration Successful!");
            location.reload();
        }

        /* =====================
           LOGIN (EMAIL BASED)
        ===================== */
        else {

            const emailIn = el('login-email')?.value?.trim();
            const passIn = el('password')?.value?.trim();

            if (!emailIn || !passIn) {
                return alert("Please Enter Email And Password");
            }

            const snapshot = await get(ref(db, 'users'));

            let foundUser = null;
            let foundUsername = null;

            snapshot.forEach(child => {
                const data = child.val();

                if (data.email === emailIn) {
                    foundUser = data;
                    foundUsername = child.key;
                }
            });

            if (!foundUser) {
                return alert("User Not Found");
            }

            if (foundUser.password !== passIn) {
                return alert("Invalid Password");
            }

            localStorage.setItem('seller_id', foundUsername);

            window.location.href = 'dashboard.html';
        }
    }
});
</script>
</body>
</html>
