<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimum-scale=1.0">
    <title>Kogan | Live Support Workspace</title>
    
    <!-- Premium Geometric Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Ultra VIP Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #030306;
            --glass-surface: rgba(13, 13, 20, 0.45);
            --glass-card: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-border-light: rgba(255, 255, 255, 0.12);
            
            /* VIP 3D Gradients */
            --glow-gold: linear-gradient(135deg, #FFE259 0%, #FFA751 100%);
            --glow-cyan: linear-gradient(135deg, #00F2FE 0%, #4FACFE 100%);
            --glow-neon: linear-gradient(135deg, #7F00FF 0%, #E100FF 100%);
            --text-gradient: linear-gradient(180deg, #FFFFFF 0%, #A0A0B5 100%);
            
            --text-main: #FFFFFF;
            --text-muted: #7E7E96;
            --shadow-3d: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            
            /* Bubble Palette */
            --bubble-user: linear-gradient(135deg, rgba(0, 242, 254, 0.15) 0%, rgba(79, 172, 254, 0.15) 100%);
            --bubble-user-border: rgba(0, 242, 254, 0.25);
            --bubble-admin: linear-gradient(135deg, rgba(255, 226, 89, 0.08) 0%, rgba(255, 167, 81, 0.08) 100%);
            --bubble-admin-border: rgba(255, 167, 81, 0.2);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
            touch-action: pan-x pan-y;
        }

        /* 3D Kinetic Light Fields */
        .ambient-field { position: absolute; border-radius: 50%; filter: blur(140px); z-index: -1; opacity: 0.45; animation: orbit 25s infinite alternate ease-in-out; }
        .field-gold { width: 500px; height: 500px; background: radial-gradient(circle, #FFA751 0%, transparent 70%); top: -150px; right: -100px; }
        .field-purple { width: 600px; height: 600px; background: radial-gradient(circle, #7F00FF 0%, transparent 70%); bottom: -200px; left: -150px; animation-delay: -10s; }

        @keyframes orbit {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { transform: translate(60px, 40px) scale(1.15) rotate(360deg); }
        }

        /* Persistent Premium Sidebar */
        .sidebar {
            width: 290px;
            background: var(--glass-surface);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid var(--glass-border);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .brand-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 50px; padding-left: 12px; }
        .brand-logo-cube { width: 32px; height: 32px; background: var(--glow-cyan); border-radius: 8px; transform: rotate(45deg); box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }
        .brand-name { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; background: var(--glow-cyan); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .nav-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
        
        .nav-link {
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            border: 1px solid transparent;
        }

        .nav-link i { font-size: 20px; transition: transform 0.3s ease; }
        .nav-link:hover { color: var(--text-main); background: rgba(255, 255, 255, 0.02); border-color: var(--glass-border); }
        .nav-link:hover i { transform: translateX(3px); }
        
        .nav-link.active {
            color: var(--text-main);
            background: var(--glass-card);
            border-top: 1px solid var(--glass-border-light);
            border-left: 1px solid var(--glass-border-light);
            border-right: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--shadow-3d);
        }
        .nav-link.active i { color: #00F2FE; }

        /* Structural Layout Matrix */
        .app-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; width: 100%; }
        
        .header-bar {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(3, 3, 6, 0.3);
            backdrop-filter: blur(15px);
            z-index: 90;
            width: 100%;
        }

        .menu-trigger { display: none; background: none; border: none; color: white; font-size: 26px; cursor: pointer; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 95; }

        .profile-cluster { display: flex; align-items: center; gap: 16px; cursor: pointer; }
        .profile-badge-3d {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--glow-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.2);
            border-top: 1px solid rgba(255,255,255,0.4);
        }

        /* Chat Core Workspace Matrix */
        .workspace-matrix {
            flex: 1;
            display: grid;
            grid-template-columns: 340px 1fr;
            overflow: hidden;
            background: rgba(3, 3, 6, 0.2);
            width: 100%;
        }

        /* Left Chat History Column */
        .history-column {
            border-right: 1px solid var(--glass-border);
            background: rgba(5, 5, 10, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .column-header {
            padding: 24px;
            border-bottom: 1px solid var(--glass-border);
        }

        .column-title {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: var(--text-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .history-scroll-panel {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* History Cards styling */
        .history-card {
            background: var(--glass-card);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .history-card:hover, .history-card.active-thread {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(0, 242, 254, 0.3);
            transform: translateY(-2px);
        }
        .history-card.active-thread {
            border-color: #00F2FE;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        .card-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .card-entity-name { font-size: 14px; font-weight: 700; color: #fff; }
        .card-timestamp { font-size: 11px; color: var(--text-muted); font-weight: 500; }
        .card-excerpt { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Right Core Interactive Chat Sandbox */
        .sandbox-column {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            background: rgba(0, 0, 0, 0.1);
        }

        .sandbox-topbar {
            height: 75px;
            border-bottom: 1px solid var(--glass-border);
            padding: 0 32px;
            display: flex;
            align-items: center;
            background: rgba(3, 3, 6, 0.2);
            backdrop-filter: blur(10px);
        }

        .active-entity-details { display: flex; align-items: center; gap: 14px; }
        .active-avatar-orb { width: 38px; height: 38px; border-radius: 12px; background: var(--glow-gold); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; color: #030306; box-shadow: 0 0 15px rgba(255,167,81,0.2); }
        .active-title-text { font-size: 16px; font-weight: 700; color: #fff; }
        .active-status-pulse { font-size: 12px; color: #00F260; display: flex; align-items: center; gap: 6px; font-weight: 500; margin-top: 2px; }
        .pulse-dot { width: 6px; height: 6px; background: #00F260; border-radius: 50%; box-shadow: 0 0 10px #00F260; animation: blinker 2s infinite ease-in-out; }
        @keyframes blinker { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* Dialog Interface Scroller */
        .dialog-terminal-view {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message-row { display: flex; width: 100%; position: relative; }
        .message-row.row-user { justify-content: flex-end; }
        .message-row.row-admin { justify-content: flex-start; }

        .bubble-capsule {
            max-width: 65%;
            padding: 16px 20px;
            border-radius: 20px;
            position: relative;
            box-shadow: var(--shadow-3d);
        }
        .row-user .bubble-capsule {
            background: var(--bubble-user);
            border: 1px solid var(--bubble-user-border);
            border-bottom-right-radius: 4px;
        }
        .row-admin .bubble-capsule {
            background: var(--bubble-admin);
            border: 1px solid var(--bubble-admin-border);
            border-bottom-left-radius: 4px;
        }

        .bubble-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .row-user .bubble-header { color: #00F2FE; }
        .row-admin .bubble-header { color: #FFA751; }

        .bubble-body-text { font-size: 14.5px; color: #fff; line-height: 1.5; word-break: break-word; font-weight: 500; }
        .bubble-time-stamp { text-align: right; font-size: 10px; color: var(--text-muted); font-weight: 600; margin-top: 8px; }

        /* Fixed Message Pipeline Input Console Layout */
        .input-pipeline-console {
            padding: 24px 32px;
            border-top: 1px solid var(--glass-border);
            background: rgba(3, 3, 6, 0.4);
            backdrop-filter: blur(25px);
        }

        .input-form-wrapper {
            display: flex;
            gap: 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            padding: 6px 6px 6px 18px;
            border-radius: 18px;
            align-items: center;
            transition: border-color 0.3s ease;
        }
        .input-form-wrapper:focus-within { border-color: #00F2FE; }

        .console-terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 14.5px;
            font-weight: 500;
            padding: 10px 0;
        }
        .console-terminal-input::placeholder { color: var(--text-muted); }

        .console-dispatch-trigger {
            background: var(--glow-cyan);
            border: none;
            outline: none;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #030306;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }
        .console-dispatch-trigger:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 25px rgba(0, 242, 254, 0.5); }
        .console-dispatch-trigger:disabled { background: rgba(255,255,255,0.05); color: var(--text-muted); box-shadow: none; cursor: not-allowed; }

        /* Loader Overlays */
        .loader-backdrop { display: flex; justify-content: center; align-items: center; height: 100%; width: 100%; }
        .spinner-3d { border: 3px solid rgba(255,255,255,0.03); border-top: 3px solid #00F2FE; border-radius: 50%; width: 40px; height: 40px; animation: cycle 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        @keyframes cycle { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .logout-btn { background: rgba(255, 50, 50, 0.1); border: 1px solid rgba(255, 50, 50, 0.3); color: #ff5555; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .logout-btn:hover { background: rgba(255, 50, 50, 0.2); }

        /* Empty Area Layout Fallback Graphic elements */
        .terminal-fallback-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 40px; }
        .fallback-shield-icon { width: 72px; height: 72px; border-radius: 22px; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; font-size: 32px; color: var(--text-muted); margin-bottom: 20px; box-shadow: var(--shadow-3d); }

        /* System Action Utilities */
        .toast-notification-center { position: fixed; bottom: 32px; right: 32px; z-index: 2500; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast-capsule { background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 65, 108, 0.3); padding: 16px 20px; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px; color: #fff; font-size: 13.5px; font-weight: 600; transform: translateY(40px); opacity: 0; animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; pointer-events: auto; }
        @keyframes slideIn { to { transform: translateY(0); opacity: 1; } }

        /* Premium Responsive Breakpoint Matrix */
        @media (max-width: 1024px) {
            .workspace-matrix { grid-template-columns: 280px 1fr; }
        }

        @media (max-width: 768px) {
            body { overflow: auto; height: auto; min-height: 100vh; }
            .app-container { overflow: visible; height: auto; min-height: 100vh; width: 100%; }
            .sidebar { position: fixed; left: -290px; top: 0; bottom: 0; height: 100%; }
            .sidebar.visible { transform: translateX(290px); }
            .sidebar-overlay.visible { display: block; }
            .menu-trigger { display: block; }
            .header-bar { padding: 0 24px; height: 80px; }
            .workspace-matrix { grid-template-columns: 1fr; }
            .history-column { display: none; }
            .dialog-terminal-view { padding: 20px; }
            .bubble-capsule { max-width: 85%; }
            .input-pipeline-console { padding: 16px; }
        }
    </style>
</head>

    <script>
        document.addEventListener('wheel', function(event) {
            if (event.ctrlKey) { event.preventDefault(); }
        }, { passive: false });

        document.addEventListener('keydown', function(event) {
            if (event.ctrlKey && (event.key === '=' || event.key === '-' || event.key === '0' || event.keyCode === 187 || event.keyCode === 189 || event.keyCode === 48)) {
                event.preventDefault();
            }
        });

        let lastTouchEndTimestamp = 0;
        document.addEventListener('touchend', function(event) {
            const currentTimestamp = (new Date()).getTime();
            if (currentTimestamp - lastTouchEndTimestamp <= 300) { event.preventDefault(); }
            lastTouchEndTimestamp = currentTimestamp;
        }, false);
    </script>

        function calculateRelativeTimeDelta(epochTimestamp) {
            if (!epochTimestamp) return 'N/A';
            const elapsedDeltaMs = Date.now() - epochTimestamp;
            const computedMins = Math.floor(elapsedDeltaMs / 60000);
            if (computedMins < 1) return 'Just now';
            if (computedMins < 60) return `${computedMins}m ago`;
            const computedHrs = Math.floor(computedMins / 60);
            if (computedHrs < 24) return `${computedHrs}h ago`;
            return new Date(epochTimestamp).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
        }

                capsule.style.transform = 'translateY(-20px)';
                capsule.style.transition = 'all 0.4s ease';
                setTimeout(() => capsule.remove(), 400);
            }, 3500);
        }

        async function runMessagingSandboxPipelineBootstrap() {
            const dialogViewport = document.getElementById('dialog-terminal-viewport');
            const historyThreadsContainer = document.getElementById('history-threads-reservoir');
            
            try {
                const userSnapshotRefNode = await get(ref(db, `users/${currentAuthenticatedUser}`));
                if (userSnapshotRefNode.exists()) {
                    localUserObjectNodeCache = userSnapshotRefNode.val();
                    document.getElementById('topbar-profile-target').innerHTML = `
                        <span style="font-size: 14px; font-weight: 700; color: #FFFFFF;">${localUserObjectNodeCache.name || 'Partner'}</span>
                        <div class="profile-badge-3d">${(localUserObjectNodeCache.name || 'P').charAt(0).toUpperCase()}</div>
                    `;
                }

                const internalSubtreeChannelsRoute = ref(db, `support_chats`);

                onValue(internalSubtreeChannelsRoute, (globalSupportChatsDirectorySnapshot) => {
                    let collectedThreadCardsMarkup = '';
                    let activeChannelFoundInSystemTree = false;

                    if (globalSupportChatsDirectorySnapshot.exists()) {
                        const globalRegistryTree = globalSupportChatsDirectorySnapshot.val();

                        for (const clientChannelKey in globalRegistryTree) {
                            if (clientChannelKey !== currentActiveChatChannelId) continue;

                            const threadObjectPayload = globalRegistryTree[clientChannelKey];
                            activeChannelFoundInSystemTree = true;

                            collectedThreadCardsMarkup += `
                                <div class="history-card active-thread" id="thread-card-element-${clientChannelKey}">
                                    <div class="card-top-row">
                                        <span class="card-entity-name">${threadObjectPayload.name || 'Operations Support'}</span>
                                        <span class="card-timestamp">${calculateRelativeTimeDelta(threadObjectPayload.lastUpdated)}</span>
                                    </div>
                                    <div class="card-excerpt">${threadObjectPayload.lastMessage || 'Handshake channel opened.'}</div>
                                </div>
                            `;
                        }
                    }

                    if (!activeChannelFoundInSystemTree) {
                        const fallbackedClientNameString = localUserObjectNodeCache ? (localUserObjectNodeCache.name || 'Seller Studio Channel') : 'Seller Channel Platform';
                        collectedThreadCardsMarkup = `
                            <div class="history-card active-thread">
                                <div class="card-top-row">
                                    <span class="card-entity-name">${fallbackedClientNameString}</span>
                                    <span class="card-timestamp">Now</span>
                                </div>
                                <div class="card-excerpt">Initialization sequence ready...</div>
                            </div>
                        `;
                    }

                    historyThreadsContainer.innerHTML = collectedThreadCardsMarkup;
                });

                const activeTargetChatTimelineNodeRef = ref(db, `support_chats/${currentActiveChatChannelId}`);
                
                onValue(activeTargetChatTimelineNodeRef, (chatChannelSnapshot) => {
                    document.getElementById('sandbox-header-node').style.display = 'flex';
                    const activeHeaderTitleElement = document.getElementById('active-title-target');
                    const activeAvatarOrbElement = document.getElementById('active-avatar-target');

                    const fallbackedNameParam = localUserObjectNodeCache ? (localUserObjectNodeCache.name || 'Support Station') : 'Support Desk';
                    
                    const messageInputDomNode = document.getElementById('console-message-input-box');
                    const messageSubmitDomNode = document.getElementById('console-submit-trigger');
                    messageInputDomNode.removeAttribute('disabled');
                    messageSubmitDomNode.removeAttribute('disabled');

                    if (!chatChannelSnapshot.exists()) {
                        activeHeaderTitleElement.innerText = fallbackedNameParam;
                        activeAvatarOrbElement.innerText = String(fallbackedNameParam).charAt(0).toUpperCase();
                        
                        dialogViewport.innerHTML = `
                            <div class="terminal-fallback-view">
                                <div class="fallback-shield-icon"><i class="ri-chat-smile-2-line" style="color: #00F2FE;"></i></div>
                                <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 8px;">Begin Conversation Pipeline</h3>
                                <p style="color: var(--text-muted); font-size: 13.5px; max-width: 320px; line-height: 1.5;">Transmit a diagnostic data message string payload below to initialize support ticket routing nodes inside corporate headquarters.</p>
                            </div>
                        `;
                        return;
                    }

                    const channelRootDataPayload = chatChannelSnapshot.val();
                    activeHeaderTitleElement.innerText = channelRootDataPayload.name || fallbackedNameParam;
                    activeAvatarOrbElement.innerText = String(channelRootDataPayload.name || fallbackedNameParam).charAt(0).toUpperCase();

                    if (!channelRootDataPayload.messages) {
                        dialogViewport.innerHTML = `
                            <div class="terminal-fallback-view">
                                <div class="fallback-shield-icon"><i class="ri-wechat-line" style="color: #FFA751;"></i></div>
                                <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 8px;">Handshake Link Standardized</h3>
                                <p style="color: var(--text-muted); font-size: 13.5px; max-width: 320px; line-height: 1.5;">Channel node discovered. Submit your transaction query vectors or integration inquiries below.</p>
                            </div>
                        `;
                        return;
                    }

                    let compiledTimelineBubblesMarkup = '';
                    const messageTimelineSubtreePayload = channelRootDataPayload.messages;

                    const chronologicallyOrderedKeys = Object.keys(messageTimelineSubtreePayload).sort((alpha, beta) => {
                        return (messageTimelineSubtreePayload[alpha].timestamp || 0) - (messageTimelineSubtreePayload[beta].timestamp || 0);
                    });

                    chronologicallyOrderedKeys.forEach((uniqueMessageId) => {
                        const messageNodeItem = messageTimelineSubtreePayload[uniqueMessageId];
                        const checkIsUserSenderType = (messageNodeItem.sender === "user");
                        
                        const timeStringLabel = new Date(messageNodeItem.timestamp || Date.now()).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });

                        compiledTimelineBubblesMarkup += `
                            <div class="message-row ${checkIsUserSenderType ? 'row-user' : 'row-admin'}">
                                <div class="bubble-capsule">
                                    <div class="bubble-header">
                                        <span>${checkIsUserSenderType ? (channelRootDataPayload.name || 'Seller Account') : 'System Admin Office'}</span>
                                        <span style="opacity: 0.6; font-size: 9px;"><i class="ri-shield-user-line"></i> Secure</span>
                                    </div>
                                    <div class="bubble-body-text">${escapeStringHtmlEntities(messageNodeItem.text || '')}</div>
                                    <div class="bubble-time-stamp">${timeStringLabel}</div>
                                </div>
                            </div>
                        `;
                    });

                    dialogViewport.innerHTML = compiledTimelineBubblesMarkup;
                    setTimeout(() => { dialogViewport.scrollTop = dialogViewport.scrollHeight; }, 50);
                });

            } catch (rootFatalException) {
                console.error("Messaging system orchestration panic trace exception:", rootFatalException);
                triggerSystemErrorToast("Handshake transmission fault vector: " + rootFatalException.message);
            }
        }

        window.dispatchConsoleMessageStream = async function(formSubmissionEvent) {
            formSubmissionEvent.preventDefault();

            const messageInputNode = document.getElementById('console-message-input-box');
            const messageStringText = messageInputNode.value.trim();

            if (!messageStringText) return;

            const consoleSubmitTriggerBtn = document.getElementById('console-submit-trigger');
            
            messageInputNode.disabled = true;
            consoleSubmitTriggerBtn.disabled = true;

            const operationalWriteTimestamp = Date.now();
            const targetChannelWorkspaceRef = ref(db, `support_chats/${currentActiveChatChannelId}`);
            const messagesCollectionSubtreeRef = ref(db, `support_chats/${currentActiveChatChannelId}/messages`);

            try {
                const compilePayloadPacket = {
                    sender: "user",
                    text: messageStringText,
                    timestamp: operationalWriteTimestamp
                };

                const newbornMessageLocationRef = push(messagesCollectionSubtreeRef);
                await set(newbornMessageLocationRef, compilePayloadPacket);

                const defaultChannelTitleString = localUserObjectNodeCache ? (localUserObjectNodeCache.name || 'Elite Partner Asset') : 'Partner Merchant Entity';
                
                const updatesDirectoryDataMap = {
                    name: defaultChannelTitleString,
                    lastMessage: messageStringText,
                    lastUpdated: operationalWriteTimestamp
                };

                await update(targetChannelWorkspaceRef, updatesDirectoryDataMap);
                messageInputNode.value = '';

            } catch (writeExceptionError) {
                console.error("Database sync write transmission trace error payload:", writeExceptionError);
                triggerSystemErrorToast("Gateway transmission exception: " + writeExceptionError.message);
            } finally {
                messageInputNode.disabled = false;
                consoleSubmitTriggerBtn.disabled = false;
                messageInputNode.focus();
            }
        };

        function escapeStringHtmlEntities(unsafeStringValue) {
            return unsafeStringValue
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        document.addEventListener('DOMContentLoaded', runMessagingSandboxPipelineBootstrap);
    </script>

    <!-- AUTOMATIC PAGE-MATCHING ACTIVE LINK SCRIPT -->
    <script>
        const targetRouteFile = window.location.pathname.split("/").pop();
        document.querySelectorAll('.nav-link').forEach(linkNode => {
            if (linkNode.getAttribute('href') === targetRouteFile) {
                linkNode.classList.add('active');
            } else {
                linkNode.classList.remove('active');
            }
        });
    </script>
</body>
</html>
