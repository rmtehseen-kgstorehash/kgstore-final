<style>
:root, [data-theme="dark"] {
  --bg: #06060c;
  --panel: #0d0d15;
  --panel-glass: rgba(13, 13, 21, 0.8);
  --text: #ffffff;
  --text-secondary: #94a3b8;
  --muted: #64748b;
  --border: #1e1e30;
  --accent: #6366f1; 
  --accent-glow: rgba(99, 102, 241, 0.15);
  --card-bg: #0f0f1a;
  --card-hover-border: #6366f1;
  --badge-bg: rgba(99, 102, 241, 0.1);
  --badge-text: #818cf8;
  --input-bg: #131322;
  --ambient-gradient: radial-gradient(circle at 50% 0%, #13122b 0%, #06060c 60%);
}

[data-theme="light"] {
  --bg: #f8fafc;
  --panel: #ffffff;
  --panel-glass: rgba(255, 255, 255, 0.85);
  --text: #0f172a;
  --text-secondary: #475569;
  --muted: #94a3b8;
  --border: #e2e8f0;
  --accent: #6366f1;
  --accent-glow: rgba(99, 102, 241, 0.08);
  --card-bg: #ffffff;
  --card-hover-border: #6366f1;
  --badge-bg: #f1f5f9;
  --badge-text: #4f46e5;
  --input-bg: #f1f5f9;
  --ambient-gradient: radial-gradient(circle at 50% 0%, #e0e7ff 0%, #f8fafc 60%);
}

* {
  box-sizing: border-box;
  transition: background-color 0.3s ease, border-color 0.3s ease;
}

body {
  margin: 0;
  font-family: 'Plus Jakarta Sans', sans-serif;
  color: var(--text);
  background: var(--ambient-gradient);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  min-height: 100vh;
}

.app-container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 24px;
}

/* Centralized Modern Navigation Framework */
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--panel-glass);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  z-index: 1000;
}

.logo {
  font-weight: 700;
  letter-spacing: 4px;
  font-size: 18px;
  background: linear-gradient(135deg, var(--text) 40%, var(--muted) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-decoration: none;
}

.desktop-menu {
  display: flex;
  align-items: center;
  gap: 24px;
}

.desktop-menu a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s ease;
}

.desktop-menu a:hover {
  color: var(--accent);
}

.nav-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}

.lang-selector {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 500;
  border-radius: 8px;
  outline: none;
  cursor: pointer;
}

.control-btn {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 8px;
}

.control-btn:hover {
  border-color: var(--accent);
  background: var(--accent-glow);
}

.cta-button {
  background: var(--accent);
  color: #ffffff;
  border: none;
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
}

.cta-button:hover {
  opacity: 0.9;
  transform: translateY(-1px);
}

.mobile-menu-trigger {
  display: none;
}

/* Interactive Navigation Drawer Component */
.sidebar {
  position: fixed;
  top: 0;
  right: -340px;
  width: 280px;
  height: 100%;
  background: var(--panel);
  border-left: 1px solid var(--border);
  padding: 40px 30px;
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 2000;
}

.sidebar.active {
  transform: translateX(-340px);
}

body[dir="rtl"] .sidebar {
  right: auto;
  left: -340px;
  border-left: none;
  border-right: 1px solid var(--border);
}

body[dir="rtl"] .sidebar.active {
  transform: translateX(340px);
}

.sidebar .close-drawer {
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  margin-bottom: 30px;
  padding: 0;
}

.sidebar a {
  display: block;
  color: var(--text);
  text-decoration: none;
  margin: 20px 0;
  font-size: 15px;
  font-weight: 500;
}

/* Advanced Master Control Filtering Core Module */
.control-hub {
  max-width: 600px;
  margin: 60px auto 30px auto;
  padding: 0 20px;
}

.control-layout {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.search-wrapper input {
  width: 100%;
  padding: 14px 20px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  text-align: center;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
}

.search-wrapper input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-glow);
}

.filter-actions {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 7px;
  width: 100%;
}

.filter-actions select {
  width: 100%;
  min-width: 0;
  max-width: 100%;
  box-sizing: border-box;

  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);

  padding: 10px 8px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;

  border-radius: 10px;
  outline: none;
  cursor: pointer;

  text-align: center;
  text-align-last: center;

  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.filter-actions select:hover,
.filter-actions select:focus {
  border-color: var(--accent);
}

/* Mobile Fix */
@media (max-width: 480px) {
  .filter-actions {
    grid-template-columns: 1fr;
  }

  .filter-actions select {
    font-size: 11px;
    padding: 9px 7px;
  }
}
/* Performance Realtime Status Monitor Display */
.stream-monitor {
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 30px;
}

/* Premium Balanced Performance 5-Column Desktop / 2-Column Mobile Grid Framework */
.grid-frame {
  margin-bottom: 80px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

@media (min-width: 1024px) {
  .grid {
    grid-template-columns: repeat(5, 1fr);
  }
}

/* Premium Dynamic Asset Card Component Layout */
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  cursor: pointer;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
  transform: translateZ(0);
  will-change: transform;
}

.card:hover {
  border-color: var(--card-hover-border);
  box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12), 0 0 0 1px var(--accent);
}

.card-img-frame {
  width: 100%;
  aspect-ratio: 1 / 1;
  background: #f1f5f9;
  overflow: hidden;
  position: relative;
  border-radius: 16px 16px 0 0;
}

[data-theme="dark"] .card-img-frame {
  background: #090911;
}

/* Dynamic Placeholder Canvas Animation Logic */
.card-img-frame::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
  transform: translateX(-100%);
  animation: pulse 1.5s infinite;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  position: absolute;
  top: 0;
  left: 0;
}

.card img.loaded {
  opacity: 1;
}

.card:hover img.loaded {
  transform: scale(1.05);
}

.card-body {
  padding: 16px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
  gap: 8px;
}

.card-badge {
  display: inline-block;
  align-self: flex-start;
  background: var(--badge-bg);
  color: var(--badge-text);
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.title {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.4;
  color: var(--text);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  height: 38px;
  width: 100%;
}

.rating-stars {
  display: flex;
  align-items: center;
  gap: 2px;
  color: #fbbf24;
  font-size: 12px;
}

.rating-count {
  color: var(--muted);
  font-size: 12px;
  margin-left: 4px;
}

body[dir="rtl"] .rating-count {
  margin-left: 0;
  margin-right: 4px;
}

.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  width: 100%;
}

.price {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}

.view-action-btn {
  background: var(--badge-bg);
  color: var(--badge-text);
  border: none;
  font-size: 12px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
}

.card:hover .view-action-btn {
  background: var(--accent);
  color: #ffffff;
}

/* Floating Actions Controller Modules */
.floating-support-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 50px;
  height: 50px;
  background: var(--panel-glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  z-index: 1000;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}

.floating-support-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-3px);
}

/* Scroll To Top Structural Navigation Element Module Component */
.scroll-top-btn {
  position: fixed;
  bottom: 86px; 
  right: 24px;
  width: 50px;
  height: 50px;
  background: var(--panel-glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  z-index: 1000;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  opacity: 0;
  visibility: hidden;
  transform: translateY(10px);
  cursor: pointer;
  transition: opacity 0.3s ease, visibility 0.3s ease, transform 0.3s ease, border-color 0.3s ease, color 0.3s ease;
}

.scroll-top-btn.visible {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.scroll-top-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

body[dir="rtl"] .floating-support-btn,
body[dir="rtl"] .scroll-top-btn {
  right: auto;
  left: 24px;
}

@keyframes pulse {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

@media (max-width: 1023px) {
  .desktop-menu { display: none; }
  .mobile-menu-trigger { display: flex; }
  .grid { gap: 12px; }
  .card-body { padding: 12px; }
}

window.switchLanguage = function(lang) {
  currentLang = lang;
  document.body.dir = (lang === "ur" || lang === "ar") ? "rtl" : "ltr";

  document.querySelectorAll("[data-i18n]").forEach(elem => {
    const key = elem.getAttribute("data-i18n");
    if(dictionary[lang][key]) elem.textContent = dictionary[lang][key];
  });

  document.querySelectorAll("[data-i18n-holder]").forEach(elem => {
    const key = elem.getAttribute("data-i18n-holder");
    if(dictionary[lang][key]) elem.placeholder = dictionary[lang][key];
  });

  handleFilterAndSearch();
};

window.toggleThemeEngine = function() {
  const activeTheme = document.documentElement.getAttribute("data-theme") || "dark";
  const targetTheme = activeTheme === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", targetTheme);
  
  const icon = document.getElementById("themeIcon");
  if (targetTheme === "light") {
    icon.innerHTML = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
  } else {
    icon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
  }
};

function initFaviconDatabaseSynchronizer() {
  const faviconRef = ref(db, "settings/favicon");
  onValue(faviconRef, (snapshot) => {
    if (snapshot.exists()) {
      const dbFaviconUrl = snapshot.val();
      const faviconElement = document.getElementById("dynamicFavicon");
      if (faviconElement && dbFaviconUrl) {
        faviconElement.href = dbFaviconUrl;
      }
    }
  });
}

window.addEventListener("scroll", () => {
  if (window.scrollY > 800) {
    scrollTopBtn.classList.add("visible");
  } else {
    scrollTopBtn.classList.remove("visible");
  }
});

window.scrollToTopHead = function() {
  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
};

async function bootDatabasePipeline(){
  try {
    const snap = await get(ref(db, "products"));
    if(snap.exists()){
      const rawData = snap.val();
      
      masterMemoryPool = Object.keys(rawData).map(key => ({
        id: key,
        title: rawData[key].title || 'Untitled Node',
        price: parseFloat(rawData[key].price) || 0.00,
        image: rawData[key].image || ''
      })).reverse(); 

      totalItemsCount = masterMemoryPool.length;
      renderedVisibleList = [...masterMemoryPool];
      
      streamNextBatch();
      
      streamingInterval = setInterval(() => {
        if (pointerIndex >= renderedVisibleList.length) {
          clearInterval(streamingInterval);
          streamMonitor.textContent = dictionary[currentLang].freely_msg;
        } else {
          streamNextBatch();
        }
      }, 1000);

    } else {
      streamMonitor.textContent = "";
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--muted);font-size:14px;padding:40px 0;">${dictionary[currentLang].empty_msg}</div>`;
    }
  } catch(err) {
    console.error(err);
    streamMonitor.textContent = "";
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:#ef4444;font-size:14px;padding:40px 0;">${dictionary[currentLang].error_db}</div>`;
  }
}

function streamNextBatch(){
  const endpoint = Math.min(pointerIndex + batchStepSize, renderedVisibleList.length);
  const currentBatchSlice = renderedVisibleList.slice(pointerIndex, endpoint);

  if (currentBatchSlice.length === 0 && pointerIndex === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--muted);font-size:14px;padding:40px 0;">${dictionary[currentLang].zero_match}</div>`;
    return;
  }

  currentBatchSlice.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";
    card.id = `node-${p.id}`;
    card.onclick = () => location.href = "product.html?id=" + p.id;

    const pseudoRatingCount = Math.floor(180 + (p.price ? p.price * 3.8 : 95));

    card.innerHTML = `
      <div class="card-img-frame">
        <img id="img-${p.id}" alt="${p.title}" />
      </div>
      <div class="card-body">
              <div class="title">${p.title}</div>
        <div class="rating-stars">
          ⭐⭐⭐⭐•
          <span class="rating-count">(${pseudoRatingCount})</span>
        </div>
        <div class="card-footer">
          <div class="price">$${p.price.toFixed(2)}</div>
          <button class="view-action-btn">${dictionary[currentLang].view_btn} ↗</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  setTimeout(() => {
    currentBatchSlice.forEach(p => {
      const imgNode = document.getElementById(`img-${p.id}`);
      if(imgNode) {
        imgNode.src = p.image || 'https://via.placeholder.com/400';
        imgNode.onload = () => imgNode.classList.add('loaded');
      }
    });
  }, 40);

  pointerIndex = endpoint;
}

window.handleFilterAndSearch = function(){
  if(streamingInterval) clearInterval(streamingInterval);
  grid.innerHTML = "";
  pointerIndex = 0;

  const searchVal = document.getElementById("search").value.toLowerCase();
  const priceSort = document.getElementById("sortPrice").value;
  const rangeFilter = document.getElementById("filterRange").value;

  let trackingArray = masterMemoryPool.filter(p => {
    const matchSearch = p.title.toLowerCase().includes(searchVal);
    let matchRange = true;

    if (rangeFilter === "under50") matchRange = p.price < 50;
    else if (rangeFilter === "above50") matchRange = p.price >= 50 && p.price <= 200;
    else if (rangeFilter === "premium") matchRange = p.price > 200;

    return matchSearch && matchRange;
  });

  if (priceSort === "low") {
    trackingArray.sort((a, b) => a.price - b.price);
  } else if (priceSort === "high") {
    trackingArray.sort((a, b) => b.price - a.price);
  }

  renderedVisibleList = trackingArray;
  streamNextBatch();

  streamingInterval = setInterval(() => {
    if (pointerIndex >= renderedVisibleList.length) {
      clearInterval(streamingInterval);
      streamMonitor.textContent = dictionary[currentLang].freely_msg;
    } else {
      streamNextBatch();
    }
  }, 1000);
}

window.toggleMenuDrawer = function(){
  document.getElementById("sidebar").classList.toggle("active");
};

bootDatabasePipeline();
initFaviconDatabaseSynchronizer();
</script>
