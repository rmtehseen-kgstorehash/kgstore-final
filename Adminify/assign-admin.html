<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assign Orders | Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --bg-base: #060608;
        --bg-surface: rgba(255, 255, 255, 0.02);
        --border-subtle: rgba(255, 255, 255, 0.06);
        --text-main: #f3f4f6;
        --text-muted: #8e929b;
        --accent-gold: #d4af37;
        --accent-danger: #ff4a5a;
        --glass-blur: blur(20px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background-color: var(--bg-base); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

    /* Modal Styles */
    #order-modal { display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.7); backdrop-filter: var(--glass-blur); z-index: 9999; align-items:center; justify-content:center; }
    .modal-content { background: var(--bg-base); padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; border: 1px solid var(--border-subtle); box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 15px; }
    .modal-content h3 { font-size: 18px; font-weight: 700; color: white; display: flex; align-items: center; gap: 10px; }
    .modal-content .form-control { background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border-subtle); color: white; padding: 14px 16px; border-radius: 10px; font-size: 14px; outline: none; transition: border-color 0.3s ease; width: 100%; }
    .modal-content .form-control:focus { border-color: var(--accent-gold); }
    .modal-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
    .btn-submit { background: var(--accent-gold); color: #060608; padding: 14px 24px; border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; transition: transform 0.2s, opacity 0.2s; width: 100%; }
    .btn-submit:hover { transform: translateY(-2px); opacity: 0.9; }
    .btn-cancel { background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid var(--border-subtle); padding: 14px 24px; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; transition: background 0.2s; width: 100%; }
    .btn-cancel:hover { background: rgba(255, 255, 255, 0.1); }

    /* Sidebar and Layout */
    #sidebar-backcloth { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 900; display: none; }
    aside { background: rgba(10, 10, 14, 0.85); border-right: 1px solid var(--border-subtle); backdrop-filter: var(--glass-blur); padding: 30px 20px; display: flex; flex-direction: column; gap: 30px; z-index: 999; position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    aside.mobile-open { left: 0; }
    .brand-zone { display: flex; align-items: center; justify-content: space-between; padding-left: 10px; }
    .brand-title { display: flex; align-items: center; gap: 12px; }
    .logo-icon { color: var(--accent-gold); font-size: 22px; }
    .brand-zone h1 { font-size: 18px; font-weight: 800; letter-spacing: 1px; color: white; }
    .close-sidebar-btn { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; display: block; }

    nav { display: flex; flex-direction: column; gap: 6px; flex-grow: 1; overflow-y: auto; }
    .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 12px; transition: all 0.2s ease; }
    .nav-item:hover { background: rgba(255, 255, 255, 0.03); color: #fff; }
    .nav-item.active { border-left: 3px solid var(--accent-gold); background: linear-gradient(90deg, rgba(212, 175, 55, 0.05) 0%, rgba(255,255,255,0) 100%); color: var(--accent-gold); }
    .logout-btn { margin-top: auto; color: var(--accent-danger); border: 1px solid rgba(255, 74, 90, 0.15); cursor: pointer; }

    main { display: flex; flex-direction: column; min-height: 100vh; width: 100%; transition: padding-left 0.3s ease; }
    header { height: 75px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; padding: 0 20px; background: rgba(6, 6, 8, 0.4); backdrop-filter: var(--glass-blur); position: sticky; top: 0; z-index: 90; flex-shrink: 0; }
    .menu-toggle-btn { background: var(--bg-surface); border: 1px solid var(--border-subtle); color: #fff; width: 42px; height: 42px; border-radius: 10px; cursor: pointer; font-size: 18px; margin-right: 16px; }
    .view-title h2 { font-size: 18px; font-weight: 700; color: white; }
    
    .workspace { padding: 20px; flex-grow: 1; max-width: 1600px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; }

    /* Tables */
    h3.section-title { margin-top: 10px; margin-bottom: 15px; color: var(--text-muted); font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 40px; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 12px; overflow: hidden; }
    th, td { padding: 16px; border-bottom: 1px solid var(--border-subtle); font-size: 14px; text-align: left; }
    th { color: var(--text-muted); font-weight: 600; background: rgba(0, 0, 0, 0.2); }
    td { color: var(--text-main); }
    .btn { padding: 8px 14px; border: none; cursor: pointer; border-radius: 8px; font-size: 13px; font-weight: 600; background: var(--bg-surface); border: 1px solid var(--accent-gold); color: var(--accent-gold); transition: all 0.2s; }
    .btn:hover { background: var(--accent-gold); color: #000; transform: scale(1.02); }

    @media (max-width: 768px) {
        .workspace { padding: 15px; }
        table { display: block; overflow-x: auto; white-space: nowrap; }
    }

    @media (min-width: 992px) { aside { left: 0 !important; } main { padding-left: 280px; } .menu-toggle-btn { display: none; } .close-sidebar-btn { display: none; } .workspace { padding: 40px; } }
</style>
</head>
<body>

    <div id="order-modal">
        <div class="modal-content">
            <h3><i class="fa-solid fa-user-check" style="color: var(--accent-gold);"></i> Assign Seller</h3>
            <input type="text" id="sellerUsername" class="form-control" placeholder="Enter Seller Username">
            <div class="modal-actions">
                <button class="btn-submit" onclick="confirmAssignment()">Assign Order</button>
                <button class="btn-cancel" onclick="document.getElementById('order-modal').style.display='none'">Cancel</button>
            </div>
        </div>
    </div>

    <div id="sidebar-backcloth"></div>

    <aside id="app-sidebar">
        <div class="brand-zone">
            <div class="brand-title">
                <i class="fa-solid fa-shield-halved logo-icon"></i>
                <h1>CORE SYSTEM</h1>
            </div>
            <button class="close-sidebar-btn" id="btn-close-sidebar"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <nav>
            <a href="admin.html" class="nav-item"><i class="fa-solid fa-chart-pie"></i>Analytics Hub</a>
            <a href="Products-admin.html" class="nav-item"><i class="fa-solid fa-box-open"></i>Product Manager</a>
            <a href="Packages-admin.html" class="nav-item"><i class="fa-solid fa-layer-group"></i>Package Config</a>
            <a href="KYC-admin.html" class="nav-item"><i class="fa-solid fa-id-card"></i>KYC Verification</a>
            <a href="Transactions-admin.html" class="nav-item"><i class="fa-solid fa-money-bill-transfer"></i>Transactions</a>
            <a href="Sellers-admin.html" class="nav-item"><i class="fa-solid fa-users-gear"></i>Active Sellers</a>
            <a href="Orders-admin.html" class="nav-item"><i class="fa-solid fa-cart-shopping"></i>Order Registry</a>
            <a href="Assign-admin.html" class="nav-item active"><i class="fa-solid fa-hand-holding-hand"></i>Assign Orders</a>
            <a href="Chat-admin.html" class="nav-item"><i class="fa-solid fa-comments"></i>Live Support</a>
            <a href="settings-admin.html" class="nav-item"><i class="fa-solid fa-wallet"></i>Settings</a>
            
            <div class="nav-item logout-btn" id="btn-logout"><i class="fa-solid fa-arrow-right-from-bracket"></i>Exit Session</div>
        </nav>
    </aside>

    <main>
        <header>
            <div style="display: flex; align-items: center;">
                <button class="menu-toggle-btn" id="btn-menu-toggle"><i class="fa-solid fa-bars"></i></button>
                <div class="view-title"><h2>📦 Assign Orders Control</h2></div>
            </div>
        </header>
        
        <div class="workspace">
            <h3 class="section-title"><i class="fa-solid fa-list-check"></i> Unassigned Direct Orders</h3>
            <table>
                <thead>
                    <tr>
                        <th>Product Title</th>
                        <th>Buyer Name</th>
                        <th>Total (PKR)</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="directOrdersBody">
                    </tbody>
            </table>
        </div>
    </main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const db = getDatabase(initializeApp({ 
    apiKey:"AIzaSyBfNKnkuPjWCO-KnqvZrfmrbfC44K0xOY8", 
    databaseURL:"https://koganstoree-default-rtdb.firebaseio.com" 
}));

// Sidebar Navigation Logic
document.getElementById('btn-menu-toggle').addEventListener('click', () => { document.getElementById('app-sidebar').classList.add('mobile-open'); document.getElementById('sidebar-backcloth').style.display = 'block'; });
document.getElementById('btn-close-sidebar').addEventListener('click', () => { document.getElementById('app-sidebar').classList.remove('mobile-open'); document.getElementById('sidebar-backcloth').style.display = 'none'; });
document.getElementById('btn-logout').addEventListener('click', () => { localStorage.removeItem('kogan_admin_authenticated'); window.location.href = 'admin.html'; });

let selectedOrderId = "";

window.openAssignModal = (id) => { 
    selectedOrderId = id; 
    document.getElementById('sellerUsername').value = ""; // Clear input on open
    document.getElementById('order-modal').style.display = 'flex'; 
};

window.confirmAssignment = async () => {
    const username = document.getElementById('sellerUsername').value.trim();
    if(!username) return alert("Please enter a username");
    
    // Update the ref field to assign the order
    await update(ref(db, "orders/" + selectedOrderId), { ref: username });
    
    document.getElementById('order-modal').style.display = 'none';
    alert("Order assigned successfully!");
};

onValue(ref(db, "orders"), async (snap) => {
    const orders = snap.val() || {};
    let html = "";
    
    for(let id in orders){
        const o = orders[id];
        
        // 1. Filter: Only show active (not delivered) AND those without a ref
        if(o.status !== "delivered" && !o.ref){
            
            // 2. Fetch product title
            const pSnap = await get(ref(db, "products/" + o.productId));
            const product = pSnap.val() || { title: "Unknown Product" };
            
            html += `<tr>
                <td><strong>${product.title}</strong></td>
                <td>${o.name || 'N/A'}</td>
                <td style="color: var(--accent-gold); font-family: monospace;">${o.total || 0}</td>
                <td><button class="btn" onclick="openAssignModal('${id}')"><i class="fa-solid fa-link"></i> Assign Seller</button></td>
            </tr>`;
        }
    }
    
    if(html === "") {
        html = `<tr><td colspan="4" style="text-align:center; color:var(--text-muted);">No unassigned orders found.</td></tr>`;
    }
    
    document.getElementById("directOrdersBody").innerHTML = html;
});
</script>

</body>
</html>
